<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Devis — Wassou</title>
<meta name="theme-color" content="#1b4332"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title">📄 Devis & Factures</div>
      <div class="header-actions">
        <a href="devis-create.html" class="btn btn-primary btn-sm">+ Nouveau devis</a>
      </div>
    </header>
    <div class="page-body">
      <div class="filter-pills">
        <button class="pill active" onclick="filterStatus('', this)">Tous</button>
        <button class="pill" onclick="filterStatus('brouillon', this)">📝 Brouillon</button>
        <button class="pill" onclick="filterStatus('envoyé', this)">📨 Envoyé</button>
        <button class="pill" onclick="filterStatus('accepté', this)">✅ Accepté</button>
        <button class="pill" onclick="filterStatus('soldé', this)">💰 Soldé</button>
        <button class="pill" onclick="filterStatus('refusé', this)">❌ Refusé</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>N°</th><th>Date</th><th>Client</th><th>Total TTC</th><th>Reçu</th><th>Statut</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="empty" class="empty-state" style="display:none"><div class="empty-icon">📄</div><p>Aucun devis</p></div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/payment.js"></script>
<script src="js/sidebar.js"></script>
<script>
const session = App.initAdminPage(['admin','agent']);
let currentStatus = '';
if (session) {
  document.addEventListener('DOMContentLoaded', () => {
    Sidebar.inject('devis');
    render();
  });
}

function visible() {
  let list = session.role === 'admin' ? Data.devis.all() : Data.devis.forAgent(session.user_id);
  if (currentStatus) list = list.filter(d => d.statut === currentStatus);
  return list.sort((a,b) => (b.created || '').localeCompare(a.created || ''));
}

function render() {
  const list = visible();
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  document.getElementById('tbody').innerHTML = list.map(d => {
    const c = Data.clients.get(d.client_id);
    const recu = Data.paiements.forDevis(d.id).filter(p => p.statut === 'reçu').reduce((s,p) => s + p.montant, 0);
    const cls = { brouillon:'badge-grey', envoyé:'badge-blue', accepté:'badge-green', refusé:'badge-red', soldé:'badge-green' }[d.statut] || 'badge-grey';
    return `<tr>
      <td><strong>${d.numero}</strong></td>
      <td>${App.fmtDate(d.date)}</td>
      <td><a href="client-detail.html?id=${c?.id}" style="color:var(--g);font-weight:600">${c?.prenom||''} ${c?.nom||'—'}</a></td>
      <td>${App.fmtEur(d.total_ttc || 0)}</td>
      <td>${App.fmtEur(recu)}</td>
      <td><span class="badge ${cls}">${d.statut}</span></td>
      <td>
        <a href="devis-create.html?id=${d.id}" class="action-btn" title="Voir/Modifier">✏️</a>
        <button class="action-btn" onclick="duplicate('${d.id}')" title="Dupliquer">📋</button>
        <a href="paiements.html?devis=${d.id}" class="action-btn" title="Encaisser">💳</a>
        ${session.role==='admin' ? `<button class="action-btn danger" onclick="del('${d.id}')" title="Supprimer">🗑️</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

function filterStatus(s, btn) {
  currentStatus = s;
  document.querySelectorAll('.filter-pills .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function duplicate(id) {
  const d = Data.devis.get(id); if (!d) return;
  const copy = { ...d };
  delete copy.id; delete copy.numero; delete copy.created;
  copy.statut = 'brouillon';
  Data.devis.add(copy);
  App.toast('✅ Devis dupliqué', 'success');
  render();
}

function del(id) {
  if (!confirm('Supprimer ce devis ?')) return;
  Data.devis.remove(id);
  App.toast('Devis supprimé');
  render();
}
</script>
</body>
</html>
