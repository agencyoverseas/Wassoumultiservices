<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <title>Mon espace — Wassou</title>
  <meta name="theme-color" content="#1b4332"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* Photos uploader */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .photo-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: #f1f5f2;
    }
    .photo-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .photo-thumb .del {
      position: absolute;
      top: 4px; right: 4px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(0,0,0,.7);
      color: #fff; border: 0;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-add {
      aspect-ratio: 1;
      border: 2px dashed #9aafa3;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4a6358;
      cursor: pointer;
      background: #f8faf9;
      transition: all .2s;
    }
    .photo-add:hover { background: #e8f5e9; border-color: #1b4332; }
    .photo-add.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .photo-counter {
      font-size: .82rem;
      color: #4a6358;
      margin-top: 6px;
    }
    .intervention-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
      border: 1px solid #e2e8e4;
      box-shadow: 0 2px 6px rgba(0,0,0,.04);
    }
    .intervention-card h4 {
      font-size: 1rem;
      margin-bottom: 6px;
      color: #1b4332;
    }
    .intervention-card .meta {
      font-size: .82rem;
      color: #4a6358;
      margin-bottom: 12px;
    }
    .intervention-card .meta div { margin: 2px 0; }
    .status-actions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
    }
  </style>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🌿</span>
      <span class="logo-name">Wassou</span>
      <span class="logo-sub">Agent — Guadeloupe</span>
    </div>
    <div id="user-pill-slot"></div>
    <div class="nav-section">
      <div class="nav-section-title">Mon espace</div>
      <a href="dashboard-agent.html" class="nav-link"><span class="nav-icon">🏠</span> Accueil</a>
    </div>
    <div class="sidebar-footer">
      <a href="#" class="logout-btn" onclick="Auth.logout();return false">🚪 Déconnexion</a>
    </div>
  </nav>

  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title">🏠 Mon espace</div>
    </header>

    <div class="page-body">
      <h2 style="margin-bottom:6px;font-size:1.4rem" id="hello">Bonjour 👋</h2>
      <p style="color:var(--gray-600);margin-bottom:22px">Voici tes interventions du moment</p>

      <!-- KPIs simplifiés agent -->
      <div class="stats-grid stagger" id="kpis"></div>

      <!-- Mes interventions avec upload photos -->
      <div class="card mt-4">
        <div class="card-header"><h3>📅 Mes interventions</h3></div>
        <div id="my-int" style="padding:16px"></div>
      </div>
    </div>
  </div>
</div>

<div id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline btn-cancel">Annuler</button>
      <button class="btn btn-danger btn-confirm">Confirmer</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
const MAX_PHOTOS = 10;
const session = App.initAdminPage(['agent']);

if (session) {
  setTimeout(() => {
    document.getElementById('hello').textContent = `Bonjour ${session.nom.split(' ')[0]} 👋`;

    // KPIs simples (sans paiements ni devis)
    const safe = (fn, def) => { try { return fn() ?? def; } catch(e) { return def; } };
    const myInts = safe(() => Data.interventions.forAgent(session.user_id), []);

    document.getElementById('kpis').innerHTML = `
      <div class="stat-card green"><div class="stat-icon">📅</div><div class="stat-info"><div class="stat-value">${myInts.filter(i=>i.statut==='planifié').length}</div><div class="stat-label">À venir</div></div></div>
      <div class="stat-card gold"><div class="stat-icon">⏳</div><div class="stat-info"><div class="stat-value">${myInts.filter(i=>i.statut==='en_cours').length}</div><div class="stat-label">En cours</div></div></div>
      <div class="stat-card blue"><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-value">${myInts.filter(i=>i.statut==='terminé').length}</div><div class="stat-label">Terminées</div></div></div>
    `;

    renderInterventions(myInts);
  }, 100);
}

function renderInterventions(ints) {
  const container = document.getElementById('my-int');
  if (!ints.length) {
    container.innerHTML = '<p class="empty-state" style="padding:22px">Aucune intervention pour le moment</p>';
    return;
  }

  // Trier : à venir d'abord, puis en cours, puis terminées
  const sorted = ints.slice().sort((a, b) => {
    const order = { 'planifié': 0, 'en_cours': 1, 'terminé': 2 };
    const oa = order[a.statut] ?? 99;
    const ob = order[b.statut] ?? 99;
    if (oa !== ob) return oa - ob;
    return (a.date || '').localeCompare(b.date || '');
  });

  container.innerHTML = sorted.map(i => {
    const c = Data.clients.get?.(i.client_id);
    const photos = i.photos || [];
    const statutBadge = {
      'planifié': '<span class="badge badge-info">📅 Planifiée</span>',
      'en_cours': '<span class="badge badge-warning">⏳ En cours</span>',
      'terminé': '<span class="badge badge-success">✅ Terminée</span>'
    }[i.statut] || `<span class="badge badge-gray">${i.statut || '—'}</span>`;

    const canAdd = photos.length < MAX_PHOTOS;

    return `
      <div class="intervention-card" id="card-${i.id}">
        <h4>${c?.prenom || ''} ${c?.nom || '—'} ${statutBadge}</h4>
        <div class="meta">
          <div>🏷️ ${i.service || '—'}</div>
          <div>📅 ${App.fmtDate(i.date)} ${i.heure || ''}</div>
          <div>📍 ${i.adresse || c?.adresse || '—'}</div>
          ${c?.telephone ? `<div>📞 <a href="tel:${c.telephone}">${c.telephone}</a></div>` : ''}
        </div>

        <div class="status-actions">
          ${i.statut === 'planifié' ? `<button class="btn btn-primary btn-sm" onclick="setStatus('${i.id}','en_cours')">▶️ Démarrer</button>` : ''}
          ${i.statut === 'en_cours' ? `<button class="btn btn-success btn-sm" onclick="setStatus('${i.id}','terminé')">✅ Terminer</button>` : ''}
          ${i.statut !== 'planifié' ? `<button class="btn btn-ghost btn-sm" onclick="setStatus('${i.id}','planifié')">↩️ Replanifier</button>` : ''}
        </div>

        <div style="margin-top:14px">
          <strong style="font-size:.88rem">📸 Photos (${photos.length}/${MAX_PHOTOS})</strong>
          <div class="photos-grid" id="photos-${i.id}">
            ${photos.map((p, idx) => `
              <div class="photo-thumb">
                <img src="${p}" alt="Photo ${idx + 1}"/>
                <button class="del" onclick="removePhoto('${i.id}', ${idx})">×</button>
              </div>
            `).join('')}
            <label class="photo-add ${canAdd ? '' : 'disabled'}" for="upload-${i.id}">
              <span style="font-size:24px">📷</span>
              <span style="font-size:.7rem">Ajouter</span>
            </label>
            <input type="file" id="upload-${i.id}" accept="image/*" multiple capture="environment"
                   style="display:none" onchange="addPhotos('${i.id}', this)" ${canAdd ? '' : 'disabled'}/>
          </div>
          ${!canAdd ? '<p class="photo-counter">⚠️ Maximum 10 photos atteint</p>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ============ ACTIONS ============

function setStatus(id, newStatus) {
  if (!Data?.interventions?.update) {
    App.toast('Fonction non disponible', 'error');
    return;
  }
  Data.interventions.update(id, { statut: newStatus });
  App.toast('Statut mis à jour ✅');
  // Recharger
  const myInts = Data.interventions.forAgent(session.user_id);
  renderInterventions(myInts);
}

async function addPhotos(intId, input) {
  const files = Array.from(input.files || []);
  if (!files.length) return;

  const intervention = Data.interventions.get?.(intId);
  if (!intervention) { App.toast('Intervention introuvable', 'error'); return; }

  const photos = intervention.photos || [];
  const remaining = MAX_PHOTOS - photos.length;

  if (remaining <= 0) {
    App.toast('Maximum 10 photos atteint', 'error');
    input.value = '';
    return;
  }

  const toAdd = files.slice(0, remaining);
  if (files.length > remaining) {
    App.toast(`Seules ${remaining} photo${remaining > 1 ? 's' : ''} ajoutée${remaining > 1 ? 's' : ''} (max 10)`, 'warning');
  }

  // Compression + conversion en base64
  for (const file of toAdd) {
    try {
      const compressed = await compressImage(file);
      photos.push(compressed);
    } catch (e) {
      console.error(e);
      App.toast('Erreur sur une photo', 'error');
    }
  }

  Data.interventions.update?.(intId, { photos });
  App.toast(`${toAdd.length} photo${toAdd.length > 1 ? 's' : ''} ajoutée${toAdd.length > 1 ? 's' : ''} 📸`);

  input.value = '';
  const myInts = Data.interventions.forAgent(session.user_id);
  renderInterventions(myInts);
}

function removePhoto(intId, photoIdx) {
  App.confirm('Supprimer cette photo ?', () => {
    const intervention = Data.interventions.get?.(intId);
    if (!intervention) return;
    const photos = (intervention.photos || []).slice();
    photos.splice(photoIdx, 1);
    Data.interventions.update?.(intId, { photos });
    App.toast('Photo supprimée');
    const myInts = Data.interventions.forAgent(session.user_id);
    renderInterventions(myInts);
  });
}

// Compression : redim max 1280px et qualité .8
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1280;
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
        else if (h > maxDim) { w = w * maxDim / h; h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(e=>console.error(e))}</script>
</body>
</html>
