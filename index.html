<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#1b4332"/>
  <title>Wassou Multiservices — Chargement…</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <style>
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 100%);
         font-family:system-ui,-apple-system,sans-serif;color:#fff;text-align:center;}
    .loader{display:flex;flex-direction:column;align-items:center;gap:18px;}
    .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.2);
             border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .logo{font-size:54px;}
    h1{font-size:1.4rem;margin:0;font-weight:600;}
    p{font-size:.9rem;opacity:.85;margin:0;}
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">🌿</div>
    <h1>Wassou Multiservices</h1>
    <div class="spinner"></div>
    <p>Chargement…</p>
  </div>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirection auto :
    // - Si déjà connecté → dashboard correspondant
    // - Sinon → login
    setTimeout(() => {
      const session = (typeof Auth !== 'undefined') ? Auth.getSession() : null;
      if (session) {
        const target = (CONFIG?.auth?.redirect_after_login?.[session.role]) || 'dashboard-admin.html';
        window.location.replace(target);
      } else {
        window.location.replace('login.html');
      }
    }, 500);
  </script>
  <script>
    // Service worker
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("sw.js").catch(e=>console.error(e));
    }
  </script>
</body>
</html>
