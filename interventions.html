<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Interventions — Wassou</title>
<meta name="theme-color" content="#1b4332"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title">📅 Interventions</div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Nouvelle</button>
      </div>
    </header>
    <div class="page-body">
      <div class="filter-pills">
        <button class="pill active" onclick="filterStatus('', this)">Toutes</button>
        <button class="pill" onclick="filterStatus('planifié', this)">📅 Planifiées</button>
        <button class="pill" onclick="filterStatus('en_cours', this)">⏳ En cours</button>
        <button class="pill" onclick="filterStatus('terminé', this)">✅ Terminées</button>
        <button class="pill" onclick="filterStatus('annulé', this)">❌ Annulées</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Date</th><th>Client</th><th>Service</th><th>Agent</th><th>Statut</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="empty" class="empty-state" style="display:none"><div class="empty-icon">📅</div><p>Aucune intervention</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal intervention -->
<div class="modal-overlay" id="m-int">
  <div class="modal">
    <div class="modal-header"><h3 id="m-title">Nouvelle intervention</h3><button class="modal-close" onclick="App.closeModal('m-int')">×</button></div>
    <div class="modal-body">
      <input type="hidden" id="i-id"/>
      <div class="fg"><label>Client *</label><select id="i-client" required></select></div>
      <div class="f-row">
        <div class="fg"><label>Service *</label><select id="i-service" required></select></div>
        <div class="fg"><label>Agent *</label><select id="i-agent" required></select></div>
      </div>
      <div class="f-row">
        <div class="fg"><label>Date *</label><input type="date" id="i-date" required/></div>
        <div class="fg"><label>Heure</label><input type="time" id="i-heure"/></div>
      </div>
      <div class="fg"><label>Adresse d'intervention</label><input id="i-adr" placeholder="Auto-rempli depuis le client"/></div>
      <div class="fg"><label>Notes</label><textarea id="i-notes" rows="3"></textarea></div>
      <div class="fg"><label>Statut</label>
        <select id="i-statut">
          <option value="planifié">📅 Planifiée</option>
          <option value="en_cours">⏳ En cours</option>
          <option value="terminé">✅ Terminée</option>
          <option value="annulé">❌ Annulée</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('m-int')">Annuler</button>
      <button class="btn btn-danger" id="i-del" style="display:none;margin-right:auto" onclick="del()">🗑️ Supprimer</button>
      <button class="btn btn-primary" onclick="save()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
const session = App.initAdminPage(['admin','agent']);
let currentStatus = '';
const params = new URLSearchParams(location.search);

if (session) {
  document.addEventListener('DOMContentLoaded', () => {
    Sidebar.inject('interventions');
    render();
    if (params.get('new') === '1') openModal(params.get('client'));
  });
}

function visibleList() {
  let list = session.role === 'admin' ? Data.interventions.all() : Data.interventions.forAgent(session.user_id);
  if (currentStatus) list = list.filter(i => i.statut === currentStatus);
  return list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function render() {
  const list = visibleList();
  const tbody = document.getElementById('tbody');
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  tbody.innerHTML = list.map(i => {
    const c = Data.clients.get(i.client_id);
    const a = CONFIG.auth.agents.find(x => x.id === i.agent_id);
    const s = CONFIG.services.find(x => x.id === i.service);
    const cls = { planifié:'badge-blue', en_cours:'badge-orange', terminé:'badge-green', annulé:'badge-red' }[i.statut] || 'badge-grey';
    return `<tr>
      <td>${App.fmtDate(i.date)} ${i.heure || ''}</td>
      <td><a href="client-detail.html?id=${c?.id}" style="color:var(--g);font-weight:600">${c?.prenom||''} ${c?.nom||'—'}</a></td>
      <td>${s ? s.icone+' '+s.nom : i.service}</td>
      <td>${a?.nom || '—'}</td>
      <td><span class="badge ${cls}">${i.statut}</span></td>
      <td><button class="action-btn" onclick="edit('${i.id}')">✏️</button></td>
    </tr>`;
  }).join('');
}

function filterStatus(s, btn) {
  currentStatus = s;
  document.querySelectorAll('.filter-pills .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function fillSelects(prefId = null) {
  const cs = document.getElementById('i-client');
  const allowed = session.role === 'admin' ? Data.clients.all() : Data.clients.all().filter(c => Data.interventions.forClient(c.id).some(i => i.agent_id === session.user_id) || c.id === prefId);
  cs.innerHTML = '<option value="">— Choisir —</option>' + Data.clients.all().map(c => `<option value="${c.id}" ${c.id===prefId?'selected':''}>${c.prenom||''} ${c.nom}</option>`).join('');
  document.getElementById('i-service').innerHTML = CONFIG.services.map(s => `<option value="${s.id}">${s.icone} ${s.nom}</option>`).join('');
  document.getElementById('i-agent').innerHTML = CONFIG.auth.agents.filter(a => a.actif!==false).map(a => `<option value="${a.id}" ${session.role==='agent'&&a.id===session.user_id?'selected':''}>${a.nom}</option>`).join('');
}

function openModal(prefClientId) {
  document.getElementById('m-title').textContent = 'Nouvelle intervention';
  document.getElementById('i-id').value = '';
  document.getElementById('i-del').style.display = 'none';
  fillSelects(prefClientId);
  ['i-date','i-heure','i-adr','i-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('i-statut').value = 'planifié';
  document.getElementById('i-date').value = new Date().toISOString().slice(0,10);
  // Auto-remplit adresse quand client sélectionné
  document.getElementById('i-client').onchange = (e) => {
    const c = Data.clients.get(e.target.value);
    if (c && !document.getElementById('i-adr').value) document.getElementById('i-adr').value = c.adresse || '';
  };
  App.openModal('m-int');
}

function edit(id) {
  const i = Data.interventions.get(id); if (!i) return;
  document.getElementById('m-title').textContent = 'Modifier l\'intervention';
  document.getElementById('i-id').value = i.id;
  document.getElementById('i-del').style.display = session.role === 'admin' ? 'inline-flex' : 'none';
  fillSelects(i.client_id);
  document.getElementById('i-client').value = i.client_id;
  document.getElementById('i-service').value = i.service;
  document.getElementById('i-agent').value = i.agent_id;
  document.getElementById('i-date').value = i.date || '';
  document.getElementById('i-heure').value = i.heure || '';
  document.getElementById('i-adr').value = i.adresse || '';
  document.getElementById('i-notes').value = i.notes || '';
  document.getElementById('i-statut').value = i.statut || 'planifié';
  App.openModal('m-int');
}

function save() {
  const id = document.getElementById('i-id').value;
  const data = {
    client_id: document.getElementById('i-client').value,
    service: document.getElementById('i-service').value,
    agent_id: document.getElementById('i-agent').value,
    date: document.getElementById('i-date').value,
    heure: document.getElementById('i-heure').value,
    adresse: document.getElementById('i-adr').value,
    notes: document.getElementById('i-notes').value,
    statut: document.getElementById('i-statut').value,
  };
  if (!data.client_id || !data.date || !data.agent_id) { App.toast('⚠️ Client, agent et date requis', 'warn'); return; }
  if (id) Data.interventions.update(id, data); else Data.interventions.add(data);
  App.closeModal('m-int');
  App.toast('✅ Intervention enregistrée', 'success');
  render();
}

function del() {
  const id = document.getElementById('i-id').value;
  if (!confirm('Supprimer cette intervention ?')) return;
  Data.interventions.remove(id);
  App.closeModal('m-int');
  App.toast('Intervention supprimée');
  render();
}
</script>
</body>
</html>
