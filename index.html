<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#1b4332"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Wassou"/>
  <meta name="format-detection" content="telephone=no"/>
  <title>Wassou Multiservices — Chargement…</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    body{display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 100%);
         font-family:system-ui,-apple-system,sans-serif;color:#fff;text-align:center;
         padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
    .loader{display:flex;flex-direction:column;align-items:center;gap:18px;}
    .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.2);
             border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .logo{font-size:54px;}
    h1{font-size:1.4rem;margin:0;font-weight:600;}
    p{font-size:.9rem;opacity:.85;margin:0;}
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">🌿</div>
    <h1>Wassou Multiservices</h1>
    <div class="spinner"></div>
    <p>Chargement…</p>
  </div>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirection auto
    setTimeout(() => {
      const session = (typeof Auth !== 'undefined') ? Auth.getSession() : null;
      if (session) {
        const target = (CONFIG?.auth?.redirect_after_login?.[session.role]) || 'dashboard-admin.html';
        window.location.replace(target);
      } else {
        window.location.replace('login.html');
      }
    }, 500);
  </script>
  <script>
    // Service worker — enregistrement précoce pour mode app
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("sw.js").then(reg => {
        console.log("[SW] Registered:", reg.scope);
      }).catch(e=>console.error("[SW] Failed:",e));
    }
    // Empêche les gestes de pinch-zoom
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());
  </script>
</body>
</html>
