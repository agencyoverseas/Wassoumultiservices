<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Agents — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <button class="fab-add" id="addBtn"></button>
  <div id="list"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('agents','Agents', `${DB.agents.all().length} agents`)) {} else {

  document.getElementById('addBtn').innerHTML = App.icons.plus + ' Nouvel agent';

  function render(){
    const arr = DB.agents.all();
    const list = document.getElementById('list');
    if (!arr.length){
      list.innerHTML = `<div class="page-empty"><div class="ic">🧑‍🌾</div><div>Aucun agent</div></div>`;
      return;
    }
    list.innerHTML = arr.map(a => `
      <div class="list-item" data-id="${a.id}">
        <div class="li-head">
          <div>
            <div class="li-name">${a.nom} ${a.prenom}</div>
            <span class="li-status status-${a.statut||'disponible'}">${a.statut==='occupe'?'Occupé':a.statut==='conge'?'Congé':'Disponible'}</span>
          </div>
          <div class="li-avatar">${a.avatar || '🧑‍🌾'}</div>
        </div>
        <div class="li-row">${App.icons.phone}<span>${a.tel||'—'}</span></div>
        <div class="li-row">${App.icons.pin}<span>${a.adresse||'—'}</span></div>
        ${a.specialites?.length ? `<div class="li-tags">${a.specialites.map(s=>`<span class="li-tag">${s}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');
  }
  render();

  document.getElementById('addBtn').addEventListener('click', () => {
    App.modal('Nouvel agent', `
      <form id="newAgent">
        <div class="form-grid-2">
          <div class="form-group"><label>Prénom</label><input class="form-control" name="prenom" required/></div>
          <div class="form-group"><label>Nom</label><input class="form-control" name="nom" required/></div>
        </div>
        <div class="form-group"><label>Téléphone</label><input class="form-control" name="tel" type="tel" required/></div>
        <div class="form-group"><label>Zone d'intervention</label><input class="form-control" name="adresse" placeholder="ex: Centre Guadeloupe"/></div>
        <div class="form-group"><label>Spécialités (séparées par virgule)</label><input class="form-control" name="specialites" placeholder="Entretien jardin, Nettoyage Kärcher"/></div>
        <div class="form-group"><label>Statut</label>
          <select class="form-control" name="statut">
            <option value="disponible">Disponible</option>
            <option value="occupe">Occupé</option>
            <option value="conge">Congé</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close>Annuler</button>
          <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>
      </form>
    `, (form) => {
      const fd = new FormData(form);
      const o = Object.fromEntries(fd);
      o.specialites = (o.specialites||'').split(',').map(s=>s.trim()).filter(Boolean);
      o.avatar = '🧑‍🌾';
      o.actif = true;
      DB.agents.add(o);
      App.toast('Agent ajouté','success');
      render();
      App.renderHeader('Agents', `${DB.agents.all().length} agents`);
    });
  });
}
</script>
</body>
</html>
