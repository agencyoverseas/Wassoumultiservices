<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Connexion — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* Animation d'entrée cohérente avec la landing */
@keyframes loginIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-bg { animation: loginIn .5s ease-out both; }
.login-back {
  position: absolute; top: 18px; left: 18px; z-index: 10;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 100px;
  background: rgba(255,255,255,.15); color: #fff;
  font-size: 13px; font-weight: 500; text-decoration: none;
  backdrop-filter: blur(8px); transition: background .2s;
}
.login-back:hover { background: rgba(255,255,255,.25); }
</style>
</head>
<body>
<a href="index.html" class="login-back" aria-label="Retour à l'accueil">← Accueil</a>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <div class="leaf">🌿</div>
      <h1>Wassou Multiservices</h1>
      <p>Services à domicile — Guadeloupe</p>
    </div>

    <div class="tab-switch">
      <button class="active" data-tab="admin">👨‍💼 Admin</button>
      <button data-tab="agent">🧑‍🌾 Agent</button>
    </div>

    <!-- ADMIN -->
    <form id="formAdmin">
      <div class="form-group">
        <label>Identifiant</label>
        <input class="form-control" name="login" autocomplete="username" placeholder="admin" required/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input class="form-control" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Se connecter</button>
      <p style="text-align:center;font-size:12px;color:var(--text-soft);margin-top:14px">
        Démo : <strong>admin</strong> / <strong>wassou2026</strong>
      </p>
    </form>

    <!-- AGENT -->
    <form id="formAgent" style="display:none">
      <div class="form-group">
        <label>Agent</label>
        <select class="form-control" name="agentId" required>
          <option value="agent-1">Démo Agent</option>
          <option value="agent-2">Rosine Kevin</option>
        </select>
      </div>
      <div class="form-group">
        <label>PIN (4 chiffres)</label>
        <input class="form-control" type="password" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="••••" required/>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Se connecter</button>
      <p style="text-align:center;font-size:12px;color:var(--text-soft);margin-top:14px">
        Démo : PIN <strong>1234</strong> (Démo Agent) / <strong>5678</strong> (Rosine)
      </p>
    </form>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
// Si déjà connecté → dashboard selon rôle
const _existingSession = Auth.getSession();
if (_existingSession) location.replace(Auth.homePage(_existingSession.role));

const tabs = document.querySelectorAll('.tab-switch button');
const formAdmin = document.getElementById('formAdmin');
const formAgent = document.getElementById('formAgent');
tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  if (t.dataset.tab === 'admin'){ formAdmin.style.display='block'; formAgent.style.display='none'; }
  else { formAdmin.style.display='none'; formAgent.style.display='block'; }
}));

formAdmin.addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(formAdmin);
  const ok = await Auth.loginAdmin(fd.get('login'), fd.get('password'));
  if (ok) location.replace('dashboard.html');
  else App.toast('Identifiants incorrects','error');
});

formAgent.addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(formAgent);
  const ok = await Auth.loginAgent(fd.get('agentId'), fd.get('pin'));
  if (ok) location.replace('dashboard-agent.html');
  else App.toast('PIN incorrect','error');
});
</script>
</body>
</html>
