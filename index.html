<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wassou"/>
<title>Wassou Multiservices</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff;text-align:center;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
.loader{display:flex;flex-direction:column;align-items:center;gap:18px}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo{font-size:64px;margin-bottom:8px}
h1{font-size:1.4rem;font-weight:700}
p{font-size:.9rem;opacity:.8}
</style>
</head>
<body>
<div class="loader">
  <div class="logo">🌿</div>
  <h1>Wassou Multiservices</h1>
  <div class="spinner"></div>
  <p>Chargement…</p>
</div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
setTimeout(() => {
  const s = Auth.getSession();
  if (s) location.replace('dashboard.html');
  else location.replace('login.html');
}, 600);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW',e));
}
</script>
</body>
</html>
