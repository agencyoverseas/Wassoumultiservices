<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Paiements — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon green" id="ic1"></div>
      <div class="kpi-info"><div class="kpi-value" id="kCa">0€</div><div class="kpi-label">CA encaissé</div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon orange" id="ic2"></div>
      <div class="kpi-info"><div class="kpi-value" id="kPending">0€</div><div class="kpi-label">En attente</div></div>
    </div>
  </div>

  <button class="fab-add" id="addBtn"></button>
  <div id="list"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('interventions','Paiements')) {} else {
  document.getElementById('ic1').innerHTML = App.icons.euro;
  document.getElementById('ic2').innerHTML = App.icons.warning;
  document.getElementById('addBtn').innerHTML = App.icons.plus + ' Nouveau paiement';

  function render(){
    const arr = DB.paiements.all().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    const ca = arr.filter(p=>p.statut==='reçu').reduce((s,p)=>s+(p.montant||0),0);
    const pending = arr.filter(p=>p.statut==='en_attente').reduce((s,p)=>s+(p.montant||0),0);
    document.getElementById('kCa').textContent = Fmt.eur(ca);
    document.getElementById('kPending').textContent = Fmt.eur(pending);

    const list = document.getElementById('list');
    if (!arr.length){ list.innerHTML = `<div class="page-empty"><div class="ic">💳</div><div>Aucun paiement</div></div>`; return; }
    list.innerHTML = arr.map(p => {
      const c = DB.clients.get(p.clientId);
      return `<div class="list-item" data-id="${p.id}">
        <div class="li-head">
          <div>
            <div class="li-name">${Fmt.eur(p.montant)}</div>
            <div style="font-size:13px;color:var(--text-soft);margin-top:4px">${c?(c.prenom+' '+c.nom):'—'}</div>
            <div style="font-size:12.5px;color:var(--text-muted);margin-top:2px">${p.methode||'—'} · ${Fmt.date(p.date)}</div>
          </div>
          <span class="li-status status-${p.statut==='reçu'?'termine':'en_attente'}">${p.statut||'—'}</span>
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('.list-item').forEach(el => {
      el.addEventListener('click', async () => {
        const p = DB.paiements.get(el.dataset.id);
        const choice = await new Promise(res => {
          App.modal('Action', `
            <div style="display:flex;flex-direction:column;gap:10px">
              <button class="btn btn-outline" data-c="toggle">${p.statut==='reçu'?'Marquer en attente':'Marquer reçu'}</button>
              <button class="btn btn-danger" data-c="del">Supprimer</button>
            </div>
          `);
          setTimeout(()=>{
            document.querySelectorAll('[data-c]').forEach(b => b.addEventListener('click', ()=>{
              document.querySelector('.modal-overlay').remove();
              res(b.dataset.c);
            }));
          },50);
        });
        if (choice==='toggle'){ DB.paiements.update(p.id,{statut:p.statut==='reçu'?'en_attente':'reçu'}); render(); App.toast('Mis à jour','success'); }
        if (choice==='del'){ if (await App.confirm('Supprimer ?')){ DB.paiements.remove(p.id); render(); App.toast('Supprimé','success'); } }
      });
    });
  }
  render();

  document.getElementById('addBtn').addEventListener('click', () => {
    const clients = DB.clients.all();
    App.modal('Nouveau paiement', `
      <form id="np">
        <div class="form-group"><label>Client</label>
          <select class="form-control" name="clientId" required>
            <option value="">— Choisir —</option>
            ${clients.map(c=>`<option value="${c.id}">${c.prenom} ${c.nom}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Montant (€)</label><input class="form-control" name="montant" type="number" min="0" step="0.01" required/></div>
        <div class="form-group"><label>Méthode</label>
          <select class="form-control" name="methode">
            <option>Espèces</option><option>Virement</option><option>Carte bancaire</option><option>Chèque</option>
          </select>
        </div>
        <div class="form-group"><label>Date</label><input class="form-control" type="date" name="date" value="${new Date().toISOString().slice(0,10)}"/></div>
        <div class="form-group"><label>Statut</label>
          <select class="form-control" name="statut">
            <option value="reçu">Reçu</option><option value="en_attente">En attente</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close>Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    `, form => {
      const o = Object.fromEntries(new FormData(form));
      o.montant = parseFloat(o.montant)||0;
      DB.paiements.add(o);
      App.toast('Paiement enregistré','success');
      render();
    });
  });
}
</script>
</body>
</html>
