<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Rapports — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in" id="main"></main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('dashboard','Rapports', 'Statistiques globales')) {} else {
  const s = DB.stats();
  const ints = DB.interventions.all();
  const byService = {};
  ints.forEach(i => { byService[i.service||'Autre'] = (byService[i.service||'Autre']||0)+1; });
  const byStatut = {};
  ints.forEach(i => { byStatut[i.statut||'—'] = (byStatut[i.statut||'—']||0)+1; });

  document.getElementById('main').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon green">${App.icons.users}</div><div class="kpi-info"><div class="kpi-value">${s.clients}</div><div class="kpi-label">Clients</div></div></div>
      <div class="kpi-card"><div class="kpi-icon blue">${App.icons.calendar}</div><div class="kpi-info"><div class="kpi-value">${s.interventionsTotal}</div><div class="kpi-label">Interventions</div></div></div>
      <div class="kpi-card"><div class="kpi-icon purple">${App.icons.trending}</div><div class="kpi-info"><div class="kpi-value">${Fmt.eur(s.caTotal)}</div><div class="kpi-label">CA total</div></div></div>
      <div class="kpi-card"><div class="kpi-icon orange">${App.icons.sms}</div><div class="kpi-info"><div class="kpi-value">${s.sms}</div><div class="kpi-label">SMS envoyés</div></div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Interventions par service</div></div>
      ${Object.keys(byService).length ? Object.entries(byService).map(([k,v]) => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-soft)">
          <span style="font-size:14px">${k}</span><strong>${v}</strong>
        </div>
      `).join('') : '<p class="empty-state">Aucune donnée</p>'}
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Répartition par statut</div></div>
      ${Object.keys(byStatut).length ? Object.entries(byStatut).map(([k,v]) => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-soft)">
          <span class="li-status status-${k}">${k}</span><strong>${v}</strong>
        </div>
      `).join('') : '<p class="empty-state">Aucune donnée</p>'}
    </div>

    <button class="btn btn-outline btn-block mt-12" id="exportBtn">${App.icons.download} Exporter les données (JSON)</button>
  `;

  document.getElementById('exportBtn').addEventListener('click', () => {
    const data = {
      clients: DB.clients.all(),
      agents: DB.agents.all(),
      interventions: DB.interventions.all(),
      devis: DB.devis.all(),
      paiements: DB.paiements.all(),
      sms: DB.sms.all(),
      exported: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `wassou-export-${Date.now()}.json`;
    a.click(); URL.revokeObjectURL(url);
    App.toast('Export téléchargé','success');
  });
}
</script>
</body>
</html>
