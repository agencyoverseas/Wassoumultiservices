<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Devis — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <button class="fab-add" id="addBtn"></button>
  <div id="list"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('interventions','Devis', `${DB.devis.all().length} devis`)) {} else {
  document.getElementById('addBtn').innerHTML = App.icons.plus + ' Nouveau devis';

  function calcTotal(lines){ return (lines||[]).reduce((s,l)=>s+(parseFloat(l.qty||0)*parseFloat(l.pu||0)),0) }

  function render(){
    const arr = DB.devis.all().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    const list = document.getElementById('list');
    if (!arr.length){
      list.innerHTML = `<div class="page-empty"><div class="ic">📄</div><div>Aucun devis</div></div>`;
      return;
    }
    list.innerHTML = arr.map(d => {
      const c = DB.clients.get(d.clientId);
      return `<div class="list-item" data-id="${d.id}">
        <div class="li-head">
          <div>
            <div class="li-name">${d.numero||d.id}</div>
            <div style="font-size:13px;color:var(--text-soft);margin-top:4px">${c?(c.prenom+' '+c.nom):'—'}</div>
            <div style="font-size:13px;color:var(--text-soft);margin-top:2px">${Fmt.date(d.date)}</div>
            <div style="font-size:16px;font-weight:700;margin-top:6px">${Fmt.eur(d.total||0)}</div>
          </div>
          <span class="li-status status-${d.statut||'brouillon'}">${d.statut||'brouillon'}</span>
        </div>
        <div class="modal-actions" style="margin-top:10px">
          <button class="btn btn-outline btn-sm" data-act="status">Changer statut</button>
          <button class="btn btn-danger btn-sm" data-act="del">Supprimer</button>
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('.list-item').forEach(el => {
      const id = el.dataset.id;
      el.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', async e => {
        e.stopPropagation();
        if (b.dataset.act === 'del'){
          if (await App.confirm('Supprimer ce devis ?')){
            DB.devis.remove(id); render(); App.toast('Supprimé','success');
          }
        } else {
          const d = DB.devis.get(id);
          App.modal('Statut du devis', `
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${['brouillon','envoyé','accepté','refusé'].map(s=>`<button class="filter-chip ${d.statut===s?'active':''}" data-s="${s}">${s}</button>`).join('')}
            </div>
          `);
          setTimeout(() => {
            document.querySelectorAll('[data-s]').forEach(btn => btn.addEventListener('click', () => {
              DB.devis.update(id, {statut: btn.dataset.s});
              document.querySelector('.modal-overlay').remove();
              App.toast('Mis à jour','success');
              render();
            }));
          }, 50);
        }
      }));
    });
  }
  render();

  document.getElementById('addBtn').addEventListener('click', () => {
    const clients = DB.clients.all();
    App.modal('Nouveau devis', `
      <form id="nd">
        <div class="form-group"><label>Client</label>
          <select class="form-control" name="clientId" required>
            <option value="">— Choisir —</option>
            ${clients.map(c=>`<option value="${c.id}">${c.prenom} ${c.nom}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Date</label><input class="form-control" type="date" name="date" value="${new Date().toISOString().slice(0,10)}" required/></div>
        <div class="form-group"><label>Description</label><input class="form-control" name="label" placeholder="ex: Entretien jardin complet" required/></div>
        <div class="form-grid-2">
          <div class="form-group"><label>Quantité</label><input class="form-control" name="qty" type="number" min="1" value="1" required/></div>
          <div class="form-group"><label>Prix unitaire (€)</label><input class="form-control" name="pu" type="number" min="0" step="0.01" required/></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea class="form-control" name="notes"></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close>Annuler</button>
          <button type="submit" class="btn btn-primary">Créer</button>
        </div>
      </form>
    `, form => {
      const o = Object.fromEntries(new FormData(form));
      const lines = [{label:o.label, qty:parseFloat(o.qty), pu:parseFloat(o.pu)}];
      const total = calcTotal(lines);
      const num = 'DEV-' + new Date().getFullYear() + '-' + String(DB.devis.all().length+1).padStart(3,'0');
      DB.devis.add({clientId:o.clientId, date:o.date, numero:num, lines, total, statut:'brouillon', notes:o.notes||''});
      App.toast('Devis créé','success');
      render();
      App.renderHeader('Devis', `${DB.devis.all().length} devis`);
    });
  });
}
</script>
</body>
</html>
