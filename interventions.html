<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Interventions — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <button class="fab-add" id="addBtn"></button>
  <div class="filter-bar">
    <button class="filter-chip active" data-f="all">Toutes</button>
    <button class="filter-chip" data-f="planifié">Planifiées</button>
    <button class="filter-chip" data-f="confirmé">Confirmées</button>
    <button class="filter-chip" data-f="en_attente">En attente</button>
    <button class="filter-chip" data-f="terminé">Terminées</button>
  </div>
  <div id="list"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('interventions','Interventions', `${DB.interventions.all().length} interventions`)) {} else {

  document.getElementById('addBtn').innerHTML = App.icons.plus + ' Nouvelle';
  let filter = 'all';
  document.querySelectorAll('.filter-chip').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    filter = c.dataset.f;
    render();
  }));

  function render(){
    let arr = DB.interventions.all().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if (filter !== 'all') arr = arr.filter(i => i.statut === filter);
    const list = document.getElementById('list');
    if (!arr.length){
      list.innerHTML = `<div class="page-empty"><div class="ic">📅</div><div>Aucune intervention</div></div>`;
      return;
    }
    list.innerHTML = arr.map(i => {
      const c = DB.clients.get(i.clientId);
      const a = DB.agents.get(i.agentId);
      return `<a href="intervention-detail.html?id=${i.id}" class="list-item">
        <div class="li-head">
          <div style="flex:1">
            <div class="li-name">${(c?.prenom||'') } ${c?.nom||'—'}</div>
            <div style="font-size:13.5px;color:var(--text-soft);margin-top:4px">${i.service || ''}</div>
            <div style="font-size:13.5px;color:var(--text);margin-top:4px">${Fmt.date(i.date)} ${i.heure||''}</div>
            <div style="font-size:13.5px;color:var(--text-soft);margin-top:4px">${a?(a.prenom+' '+a.nom):'—'}</div>
            <div style="font-size:15px;font-weight:700;color:var(--text);margin-top:6px">${Fmt.eur(i.montant)}</div>
          </div>
          <span class="li-status status-${i.statut||'planifié'}">${labelStatut(i.statut)}</span>
        </div>
      </a>`;
    }).join('');
  }

  function labelStatut(s){
    return ({planifié:'Planifiée',confirmé:'Confirmée',en_attente:'En attente',terminé:'Terminée',annulé:'Annulée'}[s]||s||'—');
  }
  render();

  // Ajout
  document.getElementById('addBtn').addEventListener('click', () => {
    const clients = DB.clients.all();
    const agents = DB.agents.all();
    App.modal('Nouvelle intervention', `
      <form id="newInt">
        <div class="form-group"><label>Client</label>
          <select class="form-control" name="clientId" required>
            <option value="">— Choisir —</option>
            ${clients.map(c=>`<option value="${c.id}">${c.prenom} ${c.nom}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Agent</label>
          <select class="form-control" name="agentId">
            <option value="">— Non assigné —</option>
            ${agents.map(a=>`<option value="${a.id}">${a.prenom} ${a.nom}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Service</label>
          <select class="form-control" name="service" required>
            <option>Entretien jardin</option>
            <option>Nettoyage Kärcher</option>
            <option>Débroussaillage</option>
            <option>Taille haies</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-grid-2">
          <div class="form-group"><label>Date</label><input class="form-control" name="date" type="date" required/></div>
          <div class="form-group"><label>Heure</label><input class="form-control" name="heure" type="time" required/></div>
        </div>
        <div class="form-group"><label>Adresse (optionnel)</label><input class="form-control" name="adresse"/></div>
        <div class="form-group"><label>Montant (€)</label><input class="form-control" name="montant" type="number" min="0" step="0.01"/></div>
        <div class="form-group"><label>Notes</label><textarea class="form-control" name="notes"></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close>Annuler</button>
          <button type="submit" class="btn btn-primary">Créer</button>
        </div>
      </form>
    `, (form) => {
      const o = Object.fromEntries(new FormData(form));
      o.montant = parseFloat(o.montant)||0;
      o.statut = 'planifié';
      o.photos = [];
      DB.interventions.add(o);
      App.toast('Intervention créée','success');
      render();
      App.renderHeader('Interventions', `${DB.interventions.all().length} interventions`);
    });
  });
}
</script>
</body>
</html>
