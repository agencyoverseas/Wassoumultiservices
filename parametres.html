<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Paramètres — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in" id="main"></main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('dashboard','Paramètres', 'Configuration')) {} else {
  const session = Auth.getSession();
  const settings = DB.settings.get();

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="card-head"><div class="card-title">Compte</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:38px">${session.avatar||'👤'}</div>
        <div>
          <div style="font-weight:600">${session.nom}</div>
          <div style="font-size:13px;color:var(--text-soft)">${session.role==='admin'?'Administrateur':'Agent terrain'}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Entreprise</div></div>
      <form id="biz">
        <div class="form-group"><label>Nom</label><input class="form-control" name="nom" value="${settings.bizNom||'Wassou Multiservices'}"/></div>
        <div class="form-group"><label>Téléphone</label><input class="form-control" name="tel" value="${settings.bizTel||'0690 67 30 85'}"/></div>
        <div class="form-group"><label>Email</label><input class="form-control" name="email" value="${settings.bizEmail||'contact@wassou-services.fr'}"/></div>
        <div class="form-group"><label>Zone</label><input class="form-control" name="zone" value="${settings.bizZone||'Guadeloupe'}"/></div>
        <button type="submit" class="btn btn-primary btn-block">Enregistrer</button>
      </form>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">À propos</div></div>
      <div style="font-size:13.5px;color:var(--text-soft);line-height:1.6">
        <strong>Wassou Multiservices — Mobile PWA</strong><br>
        Version 1.0 · Mode hors-ligne · LocalStorage<br>
        Powered by NexusAI Agency
      </div>
    </div>

    <button class="btn btn-danger btn-block mt-16" id="lo">${App.icons.logout} Déconnexion</button>
  `;

  document.getElementById('biz').addEventListener('submit', e => {
    e.preventDefault();
    const o = Object.fromEntries(new FormData(e.target));
    DB.settings.set({bizNom:o.nom, bizTel:o.tel, bizEmail:o.email, bizZone:o.zone});
    App.toast('Enregistré','success');
  });

  document.getElementById('lo').addEventListener('click', () => Auth.logout());
}
</script>
</body>
</html>
