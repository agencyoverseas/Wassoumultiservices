<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SMS — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <!-- 3 stats SMS -->
  <div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi-card" style="flex-direction:column;text-align:center;padding:14px 8px;gap:6px">
      <div style="font-size:24px">💬</div>
      <div class="kpi-value" id="kTotal">0</div>
      <div class="kpi-label">Total</div>
    </div>
    <div class="kpi-card" style="flex-direction:column;text-align:center;padding:14px 8px;gap:6px">
      <div style="font-size:24px">✅</div>
      <div class="kpi-value" style="color:var(--green-text)" id="kEnvoyes">0</div>
      <div class="kpi-label">Envoyés</div>
    </div>
    <div class="kpi-card" style="flex-direction:column;text-align:center;padding:14px 8px;gap:6px">
      <div style="font-size:24px">❌</div>
      <div class="kpi-value" style="color:var(--red)" id="kEchoues">0</div>
      <div class="kpi-label">Échoués</div>
    </div>
  </div>

  <!-- Composer -->
  <div class="card">
    <div class="card-head"><div class="card-title">Nouveau SMS</div></div>
    <form id="smsForm">
      <div class="form-group">
        <select class="form-control" name="clientId" id="clientSel" required>
          <option value="">— Choisir un client —</option>
        </select>
      </div>
      <div class="form-group">
        <textarea class="form-control" name="message" placeholder="Votre message…" maxlength="320" required id="msgInput"></textarea>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="char-counter"><span id="charCount">0</span>/320</div>
          <button type="submit" class="btn btn-primary btn-sm" id="sendBtn">Envoyer</button>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-soft);font-style:italic">Démo : le SMS est enregistré dans l'historique sans être réellement envoyé.</p>
    </form>
  </div>

  <!-- Historique -->
  <div class="card">
    <div class="card-head"><div class="card-title">Historique</div></div>
    <div id="histList"></div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('sms','SMS', `0 envoyés · 0 échoués · mode démo`)) {} else {

  // Icône bouton envoyer
  document.getElementById('sendBtn').innerHTML = App.icons.send + ' Envoyer';

  // Remplir select clients
  const clients = DB.clients.all();
  document.getElementById('clientSel').innerHTML =
    `<option value="">— Choisir un client —</option>` +
    clients.map(c => `<option value="${c.id}">${c.prenom} ${c.nom} — ${c.tel||''}</option>`).join('');

  // Compteur caractères
  const msg = document.getElementById('msgInput');
  msg.addEventListener('input', () => document.getElementById('charCount').textContent = msg.value.length);

  function refresh(){
    const s = DB.stats();
    document.getElementById('kTotal').textContent = s.sms;
    document.getElementById('kEnvoyes').textContent = s.smsEnvoyes;
    document.getElementById('kEchoues').textContent = s.smsEchoues;
    App.renderHeader('SMS', `${s.smsEnvoyes} envoyés · ${s.smsEchoues} échoués · mode démo`);

    // Historique
    const arr = DB.sms.all().slice().reverse();
    const el = document.getElementById('histList');
    if (!arr.length){ el.innerHTML = `<p class="empty-state">Aucun SMS envoyé</p>`; return; }
    el.innerHTML = arr.map(s => {
      const c = DB.clients.get(s.clientId);
      return `<div class="sms-item">
        <div class="sms-head">
          <div class="sms-to">${c?(c.prenom+' '+c.nom):s.tel||'—'} <span class="li-status status-${s.statut||'envoyé'}" style="margin-left:6px;font-size:10px;padding:2px 8px">${s.statut||'envoyé'}</span></div>
          <div class="sms-date">${Fmt.date(s.createdAt)}</div>
        </div>
        <div class="sms-body">${s.message||''}</div>
      </div>`;
    }).join('');
  }
  refresh();

  document.getElementById('smsForm').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const o = Object.fromEntries(fd);
    const c = DB.clients.get(o.clientId);
    if (!c) return App.toast('Client introuvable','error');
    DB.sms.add({ clientId:o.clientId, tel:c.tel||'', message:o.message, statut:'envoyé', type:'manuel' });
    App.toast('SMS envoyé (démo)','success');
    e.target.reset();
    document.getElementById('charCount').textContent = '0';
    refresh();
  });
}
</script>
</body>
</html>
