<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Agents — Wassou</title>
<meta name="theme-color" content="#1b4332"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title">🧑‍🌾 Agents</div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Nouvel agent</button>
      </div>
    </header>
    <div class="page-body">
      <div class="card mb-4" style="background:#fff8e1;border-color:#ffe082">
        <p style="font-size:.9rem;color:#8b6914"><strong>ℹ️ Note importante :</strong> Les agents sont définis dans <code>config.js</code>. Cette page permet d'ajouter ou modifier rapidement des agents — n'oublie pas que ces modifications sont stockées en local. Pour une production durable, édite directement <code>config.js</code>.</p>
      </div>

      <div class="cards-grid stagger" id="agents-list"></div>
    </div>
  </div>
</div>

<!-- Modal agent -->
<div class="modal-overlay" id="m-agent">
  <div class="modal">
    <div class="modal-header"><h3 id="m-title">Nouvel agent</h3><button class="modal-close" onclick="App.closeModal('m-agent')">×</button></div>
    <div class="modal-body">
      <input type="hidden" id="ag-id"/>
      <div class="f-row">
        <div class="fg"><label>Nom complet *</label><input id="ag-nom" required/></div>
        <div class="fg"><label>Prénom</label><input id="ag-prenom"/></div>
      </div>
      <div class="f-row">
        <div class="fg"><label>Avatar (emoji)</label><input id="ag-avatar" placeholder="🧑‍🌾" maxlength="3"/></div>
        <div class="fg"><label>Rôle</label><input id="ag-role" value="Agent terrain"/></div>
      </div>
      <div class="fg"><label>Téléphone</label><input type="tel" id="ag-tel"/></div>
      <div class="fg"><label>Spécialités</label>
        <div id="spec-checks" style="display:flex;gap:10px;flex-wrap:wrap"></div>
      </div>
      <div class="fg"><label>PIN à 4 chiffres *</label>
        <div style="display:flex;gap:8px">
          <input id="ag-pin" maxlength="4" pattern="[0-9]{4}" placeholder="1234" required/>
          <button class="btn btn-ghost btn-sm" onclick="genPin()">🎲 Générer</button>
        </div>
        <p style="font-size:.8rem;color:var(--text-soft);margin-top:6px">Le PIN sera hashé en SHA-256.</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('m-agent')">Annuler</button>
      <button class="btn btn-primary" onclick="saveAgent()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
const session = App.initAdminPage(['admin']);
const PRE = (window.CONFIG?.avance?.storage_prefix || 'wassou_');
const OVERRIDE_KEY = PRE + 'agents_override';

if (session) {
  document.addEventListener('DOMContentLoaded', () => {
    Sidebar.inject('agents');
    loadOverrides();
    render();
  });
}

function loadOverrides() {
  try {
    const o = JSON.parse(localStorage.getItem(OVERRIDE_KEY) || 'null');
    if (o && Array.isArray(o)) CONFIG.auth.agents = o;
  } catch {}
}

function saveOverrides() {
  localStorage.setItem(OVERRIDE_KEY, JSON.stringify(CONFIG.auth.agents));
}

function render() {
  const list = document.getElementById('agents-list');
  list.innerHTML = CONFIG.auth.agents.map(a => `
    <div class="card" style="text-align:center;padding:24px">
      <div style="font-size:3rem">${a.avatar || '👤'}</div>
      <h3 style="margin:8px 0 2px">${a.nom}</h3>
      <p style="color:var(--text-soft);font-size:.85rem">${a.role || ''}</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:12px 0">
        ${(a.specialites || []).map(s => `<span class="ag-tag">${s}</span>`).join('')}
      </div>
      <p style="font-size:.85rem;color:var(--text-soft);margin-bottom:14px">📞 ${a.telephone || '—'}</p>
      <span class="badge ${a.actif!==false?'badge-green':'badge-grey'}">${a.actif!==false?'✓ Actif':'Inactif'}</span>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:center">
        <button class="btn btn-ghost btn-sm" onclick="edit('${a.id}')">✏️ Modifier</button>
        <button class="btn btn-ghost btn-sm" onclick="toggle('${a.id}')">${a.actif!==false?'⛔ Désactiver':'✓ Activer'}</button>
      </div>
    </div>`).join('');
}

function buildSpecChecks(selected = []) {
  const wrap = document.getElementById('spec-checks');
  wrap.innerHTML = CONFIG.services.map(s => `
    <label style="display:inline-flex;gap:6px;align-items:center;background:var(--pale);padding:6px 12px;border-radius:20px;font-size:.85rem">
      <input type="checkbox" value="${s.id}" ${selected.includes(s.id)?'checked':''}/> ${s.icone} ${s.nom}
    </label>`).join('');
}

function openModal() {
  document.getElementById('m-title').textContent = 'Nouvel agent';
  document.getElementById('ag-id').value = '';
  ['ag-nom','ag-prenom','ag-tel','ag-pin'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ag-avatar').value = '🧑‍🌾';
  document.getElementById('ag-role').value = 'Agent terrain';
  buildSpecChecks([]);
  App.openModal('m-agent');
}

function edit(id) {
  const a = CONFIG.auth.agents.find(x => x.id === id); if (!a) return;
  document.getElementById('m-title').textContent = 'Modifier l\'agent';
  document.getElementById('ag-id').value = a.id;
  document.getElementById('ag-nom').value = a.nom || '';
  document.getElementById('ag-prenom').value = a.prenom || '';
  document.getElementById('ag-avatar').value = a.avatar || '';
  document.getElementById('ag-role').value = a.role || '';
  document.getElementById('ag-tel').value = a.telephone || '';
  document.getElementById('ag-pin').value = '';
  document.getElementById('ag-pin').placeholder = '••••  (laisser vide pour ne pas changer)';
  buildSpecChecks(a.specialites || []);
  App.openModal('m-agent');
}

function toggle(id) {
  const a = CONFIG.auth.agents.find(x => x.id === id);
  a.actif = a.actif === false;
  saveOverrides();
  App.toast(a.actif ? 'Agent activé' : 'Agent désactivé', 'success');
  render();
}

function genPin() {
  const pin = String(Math.floor(1000 + Math.random() * 9000));
  document.getElementById('ag-pin').value = pin;
  App.toast(`PIN généré : ${pin}`, 'success', 4000);
}

async function saveAgent() {
  const id = document.getElementById('ag-id').value;
  const data = {
    nom: document.getElementById('ag-nom').value.trim(),
    prenom: document.getElementById('ag-prenom').value.trim(),
    avatar: document.getElementById('ag-avatar').value.trim() || '🧑‍🌾',
    role: document.getElementById('ag-role').value.trim(),
    telephone: document.getElementById('ag-tel').value.trim(),
    specialites: Array.from(document.querySelectorAll('#spec-checks input:checked')).map(x => x.value),
    actif: true,
  };
  const pin = document.getElementById('ag-pin').value.trim();

  if (!data.nom) { App.toast('⚠️ Nom requis', 'warn'); return; }

  if (id) {
    const a = CONFIG.auth.agents.find(x => x.id === id);
    Object.assign(a, data);
    if (pin) {
      if (!/^\d{4}$/.test(pin)) { App.toast('⚠️ PIN = 4 chiffres', 'warn'); return; }
      a.pin_sha256 = await Auth.sha256(pin);
    }
  } else {
    if (!/^\d{4}$/.test(pin)) { App.toast('⚠️ PIN = 4 chiffres requis', 'warn'); return; }
    const newAgent = {
      id: 'agent-' + Date.now().toString(36),
      ...data,
      pin_sha256: await Auth.sha256(pin),
    };
    CONFIG.auth.agents.push(newAgent);
  }

  saveOverrides();
  App.closeModal('m-agent');
  App.toast('✅ Agent enregistré', 'success');
  render();
}
</script>
</body>
</html>
