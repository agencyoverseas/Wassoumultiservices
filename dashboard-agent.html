<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mon espace — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/app.css"/>
<style>
  /* Hero salutation agent */
  .hero-agent{background:linear-gradient(135deg,#1b4332 0%,#2d5a3f 100%);color:#fff;padding:22px 18px;border-radius:18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(27,67,50,.2)}
  .hero-agent h2{font-size:22px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .hero-agent p{font-size:14px;opacity:.85;margin:0}

  /* Cartes interventions agent */
  .int-card{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border-soft)}
  .int-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .int-card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
  .int-meta{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .int-meta-row{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-soft);line-height:1.3}
  .int-meta-row .ic{width:18px;text-align:center;flex-shrink:0}
  .int-meta-row a{color:var(--green-dark);font-weight:600}

  .int-status{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .int-status.planifie{background:var(--blue-bg,#dbeafe);color:var(--blue,#1e40af)}
  .int-status.en_cours{background:var(--orange-bg);color:var(--orange-text)}
  .int-status.termine{background:var(--green-soft);color:var(--green-dark)}

  .int-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px dashed var(--border-soft)}
  .int-actions .btn{flex:1;min-width:fit-content;font-size:13px;padding:9px 12px}

  /* Photos */
  .photos-block{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border-soft)}
  .photos-title{font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
  .photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#f1f5f2}
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .photo-thumb .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:0;font-size:12px;display:flex;align-items:center;justify-content:center}
  .photo-add{aspect-ratio:1;border:2px dashed #9aafa3;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#9aafa3;font-size:11px;cursor:pointer;background:#f9faf9}
  .photo-add:active{background:#eef3ee}
</style>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <div class="hero-agent">
    <h2 id="hello">Bonjour 👋</h2>
    <p>Voici tes interventions du moment</p>
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="card">
    <div class="card-head">
      <div class="card-title"><span class="ic">📅</span> Mes interventions</div>
    </div>
    <div id="myInterventions"></div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
const MAX_PHOTOS = 10;
const session = Auth.getSession();

if (!App.init('agent-home','Mon espace','Espace agent')) {} else if (session) {

  // Salutation
  const firstName = (session.nom || 'Agent').split(' ')[0];
  document.getElementById('hello').innerHTML = `Bonjour ${firstName} <span style="display:inline-block;animation:wave 1.5s ease-in-out infinite">👋</span>`;

  // Récupère les interventions de cet agent
  // Note : session.id correspond à 'agent-1' ou 'agent-2' (compte Auth)
  // Les interventions ont un agentId qui doit correspondre à un agent du DB
  // → on matche d'abord par nom si on ne trouve pas par id direct
  function getMyInterventions(){
    const all = DB.interventions.all();
    // tentative par id direct
    let mine = all.filter(i => i.agentId === session.id);
    if (mine.length === 0){
      // fallback : matcher par nom dans DB.agents
      const dbAgent = DB.agents.all().find(a =>
        (a.nom + ' ' + (a.prenom||'')).toLowerCase().includes((session.nom||'').toLowerCase().split(' ')[0])
        || ((a.prenom||'') + ' ' + a.nom).toLowerCase().includes((session.nom||'').toLowerCase())
      );
      if (dbAgent) mine = all.filter(i => i.agentId === dbAgent.id);
    }
    return mine;
  }

  function renderKPIs(){
    const mine = getMyInterventions();
    const planif = mine.filter(i => i.statut === 'planifié').length;
    const enCours = mine.filter(i => i.statut === 'en_cours' || i.statut === 'en cours').length;
    const finis = mine.filter(i => i.statut === 'terminé' || i.statut === 'fait').length;

    document.getElementById('kpis').innerHTML = `
      <div class="kpi-card">
        <div class="kpi-icon blue">${App.icons.calendar}</div>
        <div class="kpi-info">
          <div class="kpi-value">${planif}</div>
          <div class="kpi-label">À venir</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon orange">${App.icons.warning}</div>
        <div class="kpi-info">
          <div class="kpi-value">${enCours}</div>
          <div class="kpi-label">En cours</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon green">${App.icons.trending}</div>
        <div class="kpi-info">
          <div class="kpi-value">${finis}</div>
          <div class="kpi-label">Terminées</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon purple">${App.icons.users}</div>
        <div class="kpi-info">
          <div class="kpi-value">${mine.length}</div>
          <div class="kpi-label">Total</div>
        </div>
      </div>
    `;
  }

  function renderList(){
    const cont = document.getElementById('myInterventions');
    const mine = getMyInterventions();

    if (!mine.length){
      cont.innerHTML = `<div class="page-empty" style="padding:30px 16px"><div class="ic">📅</div><div>Aucune intervention pour le moment</div></div>`;
      return;
    }

    // Trier : planifié > en_cours > terminé, puis par date
    const order = { 'planifié': 0, 'en_cours': 1, 'en cours': 1, 'terminé': 2, 'fait': 2 };
    const sorted = mine.slice().sort((a, b) => {
      const oa = order[a.statut] ?? 99;
      const ob = order[b.statut] ?? 99;
      if (oa !== ob) return oa - ob;
      return (a.date || '').localeCompare(b.date || '');
    });

    cont.innerHTML = sorted.map(i => {
      const c = DB.clients.get(i.clientId);
      const photos = i.photos || [];
      const statutKey = (i.statut || '').replace(' ','_');
      const statutLabel = {
        'planifié': '📅 Planifiée',
        'en_cours': '⏳ En cours',
        'en cours': '⏳ En cours',
        'terminé': '✅ Terminée',
        'fait': '✅ Terminée'
      }[i.statut] || (i.statut || '—');

      const canAdd = photos.length < MAX_PHOTOS;

      return `
        <div class="int-card" id="card-${i.id}">
          <div class="int-card-head">
            <div class="int-card-name">${c ? (c.prenom + ' ' + c.nom) : 'Client inconnu'}</div>
            <span class="int-status ${statutKey}">${statutLabel}</span>
          </div>
          <div class="int-meta">
            <div class="int-meta-row"><span class="ic">🏷️</span><span>${i.service || '—'}</span></div>
            <div class="int-meta-row"><span class="ic">📅</span><span>${Fmt.date(i.date)} ${i.heure || ''}</span></div>
            <div class="int-meta-row"><span class="ic">📍</span><span>${i.adresse || (c && c.adresse) || '—'}</span></div>
            ${c && c.tel ? `<div class="int-meta-row"><span class="ic">📞</span><a href="tel:${c.tel}">${c.tel}</a></div>` : ''}
          </div>
          <div class="int-actions">
            ${i.statut === 'planifié' ? `<button class="btn btn-primary btn-sm" onclick="setStatus('${i.id}','en_cours')">▶ Démarrer</button>` : ''}
            ${(i.statut === 'en_cours' || i.statut === 'en cours') ? `<button class="btn btn-primary btn-sm" onclick="setStatus('${i.id}','terminé')">✓ Terminer</button>` : ''}
            ${(i.statut === 'terminé' || i.statut === 'fait') ? `<button class="btn btn-outline btn-sm" onclick="setStatus('${i.id}','planifié')">↩ Replanifier</button>` : ''}
            ${c && c.tel ? `<a href="tel:${c.tel}" class="btn btn-outline btn-sm">📞 Appeler</a>` : ''}
          </div>
          <div class="photos-block">
            <div class="photos-title">📸 Photos (${photos.length}/${MAX_PHOTOS})</div>
            <div class="photos-grid">
              ${photos.map((p, idx) => `
                <div class="photo-thumb">
                  <img src="${p}" alt="Photo ${idx + 1}"/>
                  <button class="del" onclick="removePhoto('${i.id}', ${idx})">×</button>
                </div>
              `).join('')}
              ${canAdd ? `
                <label class="photo-add" for="upload-${i.id}">
                  <span style="font-size:20px">📷</span>
                  <span>Ajouter</span>
                </label>
                <input type="file" id="upload-${i.id}" accept="image/*" capture="environment" multiple style="display:none" onchange="addPhotos('${i.id}', this)"/>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Actions globales (accessibles via onclick)
  window.setStatus = (id, newStatus) => {
    DB.interventions.update(id, { statut: newStatus });
    App.toast(`Statut : ${newStatus}`,'success');
    renderKPIs();
    renderList();
  };

  window.addPhotos = (id, input) => {
    const files = Array.from(input.files || []);
    const inter = DB.interventions.get(id);
    if (!inter) return;
    const photos = inter.photos || [];
    const remaining = MAX_PHOTOS - photos.length;
    files.slice(0, remaining).forEach(f => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const cur = DB.interventions.get(id);
        const next = [...(cur.photos||[]), e.target.result];
        DB.interventions.update(id, { photos: next });
        renderList();
      };
      reader.readAsDataURL(f);
    });
    input.value = '';
    App.toast('Photo(s) ajoutée(s)','success');
  };

  window.removePhoto = async (id, idx) => {
    const ok = await App.confirm('Supprimer cette photo ?');
    if (!ok) return;
    const inter = DB.interventions.get(id);
    const photos = (inter.photos||[]).filter((_, i) => i !== idx);
    DB.interventions.update(id, { photos });
    renderList();
  };

  renderKPIs();
  renderList();
}
</script>

<style>
  @keyframes wave { 0%,60%,100%{transform:rotate(0)} 10%{transform:rotate(14deg)} 20%{transform:rotate(-8deg)} 30%{transform:rotate(14deg)} 40%{transform:rotate(-4deg)} 50%{transform:rotate(10deg)} }
</style>
</body>
</html>
