<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1b4332"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.7" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d4a017" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg2)"/>
  <rect width="1200" height="900" fill="url(#spot)"/>

  <!-- Motifs feuilles -->
  <g opacity="0.15" fill="#fff">
    <path d="M 100 100 Q 250 80 300 200 Q 280 320 150 300 Q 50 220 100 100 Z"/>
    <path d="M 950 600 Q 1100 580 1150 720 Q 1100 850 950 820 Q 880 720 950 600 Z"/>
    <path d="M 250 750 Q 400 700 450 850 Q 400 900 280 880 Q 200 820 250 750 Z"/>
  </g>

  <!-- Outils stylisés -->
  <g transform="translate(600 450)">
    <circle r="160" fill="rgba(255,255,255,0.1)" stroke="#d4a017" stroke-width="3"/>
    <text y="55" font-size="180" text-anchor="middle" font-family="system-ui">👷‍♂️</text>
  </g>

  <!-- Petits icônes services autour -->
  <g font-family="system-ui">
    <text x="200" y="350" font-size="60" opacity="0.4">🌱</text>
    <text x="950" y="280" font-size="60" opacity="0.4">💦</text>
    <text x="220" y="600" font-size="60" opacity="0.4">🧽</text>
    <text x="980" y="700" font-size="60" opacity="0.4">🪟</text>
  </g>

  <!-- Texte en bas -->
  <g transform="translate(600 800)">
    <text font-size="22" text-anchor="middle" fill="#d4a017" font-weight="700" font-family="system-ui" letter-spacing="0.1em">NOTRE ÉQUIPE À VOTRE SERVICE</text>
  </g>
</svg>
