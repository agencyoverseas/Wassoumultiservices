<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b4332"/>
      <stop offset="0.5" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#40916c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0c040"/>
      <stop offset="1" stop-color="#d4a017"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#52b788" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#52b788" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>

  <!-- Grandes feuilles décoratives -->
  <g opacity="0.18" fill="#fff">
    <path d="M 100 200 Q 200 150 300 250 Q 350 350 250 400 Q 150 380 100 320 Z"/>
    <path d="M 550 700 Q 700 650 750 800 Q 700 900 600 880 Q 500 820 550 700 Z"/>
    <path d="M 50 700 Q 150 680 200 780 Q 180 880 80 850 Q 30 800 50 700 Z"/>
  </g>

  <!-- Feuille centrale grande -->
  <g transform="translate(400 500)">
    <circle r="180" fill="rgba(255,255,255,0.08)"/>
    <text y="60" font-size="240" text-anchor="middle" font-family="system-ui">🌿</text>
  </g>

  <!-- Badge en bas -->
  <g transform="translate(400 880)">
    <rect x="-160" y="-25" width="320" height="50" rx="25" fill="url(#gold)"/>
    <text y="6" font-size="18" text-anchor="middle" fill="#1a1300" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.05em">SERVICES À DOMICILE</text>
  </g>

  <!-- Petits points décoratifs -->
  <g fill="#d4a017">
    <circle cx="150" cy="100" r="6"/>
    <circle cx="680" cy="180" r="4"/>
    <circle cx="720" cy="450" r="5"/>
    <circle cx="80" cy="550" r="4"/>
    <circle cx="650" cy="950" r="6"/>
  </g>
</svg>
