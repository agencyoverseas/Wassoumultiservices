<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Fiche client — Wassou</title>
<meta name="theme-color" content="#1b4332"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title" id="ph-title">👤 Fiche client</div>
      <div class="header-actions">
        <a href="clients.html" class="btn btn-ghost btn-sm">← Retour</a>
      </div>
    </header>
    <div class="page-body">
      <div class="card mb-4">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px">
          <div>
            <h2 id="c-name" style="font-size:1.5rem;margin-bottom:6px">—</h2>
            <p style="color:var(--text-soft)" id="c-meta">—</p>
            <p style="margin-top:6px" id="c-notes"></p>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <a href="#" id="c-tel" class="btn btn-primary btn-sm">📞 Appeler</a>
            <a href="#" id="c-wa" class="btn btn-wa btn-sm" target="_blank">💬 WhatsApp</a>
          </div>
        </div>
      </div>

      <div class="filter-pills" style="margin-bottom:14px">
        <button class="pill active" onclick="switchTab('int', this)">📅 Interventions (<span id="cnt-int">0</span>)</button>
        <button class="pill" onclick="switchTab('dev', this)">📄 Devis (<span id="cnt-dev">0</span>)</button>
        <button class="pill" onclick="switchTab('pay', this)">💳 Paiements (<span id="cnt-pay">0</span>)</button>
        <button class="pill" onclick="switchTab('sms', this)">💬 SMS (<span id="cnt-sms">0</span>)</button>
      </div>

      <div class="card">
        <div id="tab-int"></div>
        <div id="tab-dev" style="display:none"></div>
        <div id="tab-pay" style="display:none"></div>
        <div id="tab-sms" style="display:none"></div>
      </div>

      <div class="header-actions mt-4" style="justify-content:center;display:flex;gap:10px;flex-wrap:wrap">
        <a href="#" id="btn-new-int" class="btn btn-primary">+ Nouvelle intervention</a>
        <a href="#" id="btn-new-dev" class="btn btn-gold">+ Nouveau devis</a>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
const session = App.initAdminPage(['admin','agent']);
const params = new URLSearchParams(window.location.search);
const clientId = params.get('id');

if (session) {
  document.addEventListener('DOMContentLoaded', () => {
    Sidebar.inject('clients');
    if (!clientId) { App.toast('Client introuvable', 'error'); setTimeout(()=>location.href='clients.html', 1500); return; }
    render();
  });
}

function render() {
  const c = Data.clients.get(clientId);
  if (!c) { App.toast('Client introuvable', 'error'); return; }
  document.getElementById('c-name').textContent = `${c.prenom || ''} ${c.nom}`.trim();
  document.getElementById('c-meta').innerHTML = `📞 ${c.tel || '—'} ${c.email ? '• ✉️ '+c.email : ''}<br/>📍 ${c.adresse || '—'}`;
  document.getElementById('c-notes').textContent = c.notes || '';
  document.getElementById('c-tel').href = `tel:${(c.tel||'').replace(/\s/g,'')}`;
  document.getElementById('c-wa').href = `https://wa.me/${(c.tel||'').replace(/\D/g,'').replace(/^0/, '590')}`;
  document.getElementById('btn-new-int').href = `interventions.html?client=${c.id}&new=1`;
  document.getElementById('btn-new-dev').href = `devis-create.html?client=${c.id}`;

  // Onglets
  const ints = Data.interventions.forClient(c.id);
  const devs = Data.devis.forClient(c.id);
  const pays = Data.paiements.all().filter(p => p.client_id === c.id);
  const smss = Data.sms.forClient(c.id);

  document.getElementById('cnt-int').textContent = ints.length;
  document.getElementById('cnt-dev').textContent = devs.length;
  document.getElementById('cnt-pay').textContent = pays.length;
  document.getElementById('cnt-sms').textContent = smss.length;

  // Interventions
  document.getElementById('tab-int').innerHTML = ints.length
    ? `<div class="table-wrapper"><table>
        <thead><tr><th>Date</th><th>Service</th><th>Agent</th><th>Statut</th></tr></thead>
        <tbody>${ints.map(i => {
          const a = CONFIG.auth.agents.find(x => x.id === i.agent_id);
          const cls = { planifié:'badge-blue', en_cours:'badge-orange', terminé:'badge-green', annulé:'badge-red' }[i.statut] || 'badge-grey';
          return `<tr><td>${App.fmtDate(i.date)} ${i.heure||''}</td><td>${i.service}</td><td>${a?.nom||'—'}</td><td><span class="badge ${cls}">${i.statut}</span></td></tr>`;
        }).join('')}</tbody></table></div>`
    : `<div class="empty-state"><div class="empty-icon">📅</div><p>Aucune intervention</p></div>`;

  // Devis
  document.getElementById('tab-dev').innerHTML = devs.length
    ? `<div class="table-wrapper"><table>
        <thead><tr><th>N°</th><th>Date</th><th>Total</th><th>Statut</th><th></th></tr></thead>
        <tbody>${devs.map(d => {
          const cls = { brouillon:'badge-grey', envoyé:'badge-blue', accepté:'badge-green', refusé:'badge-red', soldé:'badge-green' }[d.statut] || 'badge-grey';
          return `<tr><td><strong>${d.numero}</strong></td><td>${App.fmtDate(d.date)}</td><td>${App.fmtEur(d.total_ttc||0)}</td><td><span class="badge ${cls}">${d.statut}</span></td><td><a href="devis-create.html?id=${d.id}" class="action-btn">👁️</a></td></tr>`;
        }).join('')}</tbody></table></div>`
    : `<div class="empty-state"><div class="empty-icon">📄</div><p>Aucun devis</p></div>`;

  // Paiements
  document.getElementById('tab-pay').innerHTML = pays.length
    ? `<div class="table-wrapper"><table>
        <thead><tr><th>Date</th><th>Montant</th><th>Méthode</th><th>Statut</th></tr></thead>
        <tbody>${pays.map(p => {
          const cls = { reçu:'badge-green', en_attente:'badge-orange', à_encaisser:'badge-orange' }[p.statut] || 'badge-grey';
          return `<tr><td>${App.fmtDate(p.date)}</td><td><strong>${App.fmtEur(p.montant)}</strong></td><td>${p.methode}</td><td><span class="badge ${cls}">${(p.statut||'').replace('_',' ')}</span></td></tr>`;
        }).join('')}</tbody></table></div>`
    : `<div class="empty-state"><div class="empty-icon">💳</div><p>Aucun paiement</p></div>`;

  // SMS
  document.getElementById('tab-sms').innerHTML = smss.length
    ? smss.map(s => `<div style="padding:12px;border-bottom:1px solid var(--line)">
        <div style="font-size:.82rem;color:var(--text-soft);margin-bottom:4px">${App.fmtDateTime(s.date)}</div>
        <div>${s.message}</div>
      </div>`).join('')
    : `<div class="empty-state"><div class="empty-icon">💬</div><p>Aucun SMS</p></div>`;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.filter-pills .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  ['int','dev','pay','sms'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
}
</script>
</body>
</html>
