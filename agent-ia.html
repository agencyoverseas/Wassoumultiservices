<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Agent IA — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="stylesheet" href="css/app.css"/>
<style>
.chat-list{padding:14px;padding-bottom:240px}
.bub{max-width:80%;padding:12px 14px;border-radius:18px;margin-bottom:10px;font-size:14.5px;line-height:1.45;word-wrap:break-word}
.bub.user{background:var(--green-dark);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bub.bot{background:var(--surface);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm);border:1px solid var(--border-soft)}
/* Champ de saisie : décalé pour ne pas toucher la bottom-nav (espace visible) */
.chat-input-bar{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 18px);left:10px;right:10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:10px;display:flex;gap:8px;z-index:90;box-shadow:var(--shadow)}
.chat-input-bar input{flex:1;padding:12px 14px;border:1px solid var(--border);border-radius:100px;font-size:14px}
.chat-input-bar button{background:var(--green-dark);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chat-input-bar button svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.suggest{display:flex;gap:8px;overflow-x:auto;padding:0 14px 6px;scrollbar-width:none;position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 86px);left:0;right:0;z-index:89;background:linear-gradient(to bottom,transparent,var(--bg) 25%);padding-top:18px}
.suggest::-webkit-scrollbar{display:none}
.suggest button{background:var(--green-soft);color:var(--green-text);padding:8px 14px;border-radius:100px;font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;border:1px solid var(--green-soft)}
</style>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<div class="chat-list" id="chatList"></div>
<div class="suggest" id="suggest">
  <button data-q="Combien j'ai de clients ?">Combien de clients ?</button>
  <button data-q="Quel est mon CA ?">Mon CA ?</button>
  <button data-q="Interventions aujourd'hui">RDV aujourd'hui</button>
  <button data-q="Agents disponibles">Agents dispo</button>
</div>

<div class="chat-input-bar">
  <input id="inp" type="text" placeholder="Posez votre question…" autocomplete="off"/>
  <button id="send" aria-label="Envoyer"></button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
if (!App.init('dashboard','Agent IA', 'Assistant Wassou')) {} else {

document.getElementById('send').innerHTML = App.icons.send;

const chat = document.getElementById('chatList');
function addBub(txt, who){
  const b = document.createElement('div');
  b.className = 'bub ' + who;
  b.textContent = txt;
  chat.appendChild(b);
  window.scrollTo(0, document.body.scrollHeight);
}
addBub("Bonjour 🌿 ! Je suis votre assistant Wassou. Posez-moi des questions sur vos clients, RDV, CA ou agents.", 'bot');

function answer(q){
  const s = DB.stats();
  const ql = q.toLowerCase();
  if (/client/.test(ql) && /combien|nombre/.test(ql)) return `Vous avez ${s.clients} clients enregistrés.`;
  if (/agent/.test(ql) && /dispo/.test(ql)) return `${s.agentsDispo} agent(s) disponible(s) sur ${s.agents} au total.`;
  if (/ca|chiffre|revenu/.test(ql)) return `Votre CA encaissé ce mois : ${Fmt.eur(s.caMonth)} · total : ${Fmt.eur(s.caTotal)}.`;
  if (/aujourd|jour/.test(ql)) return `${s.interventionsToday} intervention(s) prévue(s) aujourd'hui.`;
  if (/intervention/.test(ql)) return `${s.interventionsTotal} intervention(s) au total. ${s.interventionsNonAssignees} non assignée(s).`;
  if (/sms/.test(ql)) return `${s.sms} SMS envoyé(s) au total.`;
  if (/devis/.test(ql)) return `${s.devis} devis enregistré(s).`;
  if (/bonjour|salut|hello/.test(ql)) return `Bonjour ! Comment puis-je vous aider aujourd'hui ?`;
  return "Je peux vous renseigner sur : clients, agents, interventions, CA, SMS, devis. Reformulez votre question 🙂";
}

function send(q){
  q = (q||document.getElementById('inp').value).trim();
  if (!q) return;
  addBub(q, 'user');
  document.getElementById('inp').value = '';
  setTimeout(() => addBub(answer(q), 'bot'), 400);
}
document.getElementById('send').addEventListener('click', () => send());
document.getElementById('inp').addEventListener('keydown', e => { if (e.key==='Enter') send(); });
document.querySelectorAll('#suggest button').forEach(b => b.addEventListener('click', ()=>send(b.dataset.q)));
}
</script>
</body>
</html>
