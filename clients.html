<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Clients — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<header class="app-header" id="header"></header>

<main class="page fade-in">
  <button class="fab-add" id="addBtn"></button>
  <div class="filter-bar">
    <button class="filter-chip active" data-f="all">Tous</button>
    <button class="filter-chip" data-f="actif">Actifs</button>
    <button class="filter-chip" data-f="prospect">Prospects</button>
    <button class="filter-chip" data-f="inactif">Inactifs</button>
  </div>
  <div id="list"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
const clientsCount = DB.clients.all().length;
if (!App.init('clients','Clients', `${clientsCount} clients`)) {} else {

  // Bouton "+" en SVG via app.icons (pas template literals dans HTML statique)
  document.getElementById('addBtn').innerHTML = App.icons.plus + ' Nouveau client';

  let filter = 'all';
  document.querySelectorAll('.filter-chip').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    filter = c.dataset.f;
    render();
  }));

  function render(){
    let arr = DB.clients.all();
    if (filter !== 'all') arr = arr.filter(c => c.statut === filter);
    const list = document.getElementById('list');
    if (!arr.length){
      list.innerHTML = `<div class="page-empty"><div class="ic">👥</div><div>Aucun client</div></div>`;
      return;
    }
    list.innerHTML = arr.map(c => `
      <a href="client-detail.html?id=${c.id}" class="list-item">
        <div class="li-head">
          <div>
            <div class="li-name">${c.nom} ${c.prenom}</div>
            <span class="li-status status-${c.statut||'actif'}">${c.statut==='prospect'?'Prospect':c.statut==='inactif'?'Inactif':'Client actif'}</span>
          </div>
        </div>
        <div class="li-row">${App.icons.phone}<span>${c.tel||'—'}</span></div>
        <div class="li-row">${App.icons.pin}<span>${c.adresse||'—'}</span></div>
      </a>
    `).join('');
  }
  render();

  // Ajout client
  document.getElementById('addBtn').addEventListener('click', () => {
    App.modal('Nouveau client', `
      <form id="newClient">
        <div class="form-group"><label>Nom</label><input class="form-control" name="nom" required/></div>
        <div class="form-group"><label>Prénom</label><input class="form-control" name="prenom" required/></div>
        <div class="form-group"><label>Téléphone</label><input class="form-control" name="tel" type="tel" required/></div>
        <div class="form-group"><label>Email</label><input class="form-control" name="email" type="email"/></div>
        <div class="form-group"><label>Adresse</label><input class="form-control" name="adresse"/></div>
        <div class="form-group"><label>Statut</label>
          <select class="form-control" name="statut">
            <option value="actif">Client actif</option>
            <option value="prospect">Prospect</option>
            <option value="inactif">Inactif</option>
          </select>
        </div>
        <div class="form-group"><label>Notes</label><textarea class="form-control" name="notes"></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close>Annuler</button>
          <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>
      </form>
    `, (form) => {
      const fd = new FormData(form);
      const obj = Object.fromEntries(fd);
      DB.clients.add(obj);
      App.toast('Client ajouté','success');
      render();
      // mettre à jour compteur header
      App.renderHeader('Clients', `${DB.clients.all().length} clients`);
    });
  });
}
</script>
</body>
</html>
