<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>SMS — Wassou</title>
<meta name="theme-color" content="#1b4332"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title">💬 SMS</div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Envoyer SMS</button>
      </div>
    </header>
    <div class="page-body">
      <div class="card mb-4" style="background:#dbeafe;border-color:#93c5fd">
        <p style="font-size:.9rem;color:#1e40af"><strong>ℹ️ Mode :</strong> <code id="prov">manuel</code> — Les SMS s'ouvrent dans ton appli iPhone/Android via le lien <code>sms:</code> ou WhatsApp. Pour automatiser, configure un provider (Twilio, OVH, Make.com) dans <code>config.js</code>.</p>
      </div>

      <div class="card">
        <h3 class="card-title">Historique</h3>
        <div id="sms-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="m-sms">
  <div class="modal">
    <div class="modal-header"><h3>📱 Envoyer un SMS</h3><button class="modal-close" onclick="App.closeModal('m-sms')">×</button></div>
    <div class="modal-body">
      <div class="fg"><label>Destinataire *</label><select id="s-client" required></select></div>
      <div class="fg"><label>Modèle</label>
        <select id="s-tpl" onchange="applyTemplate()">
          <option value="">— Personnalisé —</option>
        </select>
      </div>
      <div class="fg"><label>Message *</label><textarea id="s-msg" rows="5" required></textarea>
        <p style="font-size:.78rem;color:var(--text-soft);margin-top:4px"><span id="char-count">0</span> caractères</p>
      </div>
      <div class="fg">
        <label>Canal</label>
        <div style="display:flex;gap:10px">
          <label style="display:inline-flex;gap:6px;align-items:center"><input type="radio" name="canal" value="sms" checked/> 📱 SMS</label>
          <label style="display:inline-flex;gap:6px;align-items:center"><input type="radio" name="canal" value="whatsapp"/> 💬 WhatsApp</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('m-sms')">Annuler</button>
      <button class="btn btn-primary" onclick="send()">📤 Envoyer</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
const session = App.initAdminPage(['admin','agent']);
if (session) {
  document.addEventListener('DOMContentLoaded', () => {
    Sidebar.inject('sms');
    document.getElementById('prov').textContent = CONFIG.notifications.sms.provider;
    render();
    document.getElementById('s-msg').addEventListener('input', () => {
      document.getElementById('char-count').textContent = document.getElementById('s-msg').value.length;
    });
  });
}

function visible() {
  let list = Data.sms.all();
  if (session.role === 'agent') list = list.filter(s => s.agent_id === session.user_id);
  return list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function render() {
  const list = visible();
  const wrap = document.getElementById('sms-list');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>Aucun SMS envoyé</p></div>';
    return;
  }
  wrap.innerHTML = list.map(s => {
    const c = Data.clients.get(s.client_id);
    return `<div style="padding:14px;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong>${c?.prenom||''} ${c?.nom||'—'}</strong>
        <span style="font-size:.8rem;color:var(--text-soft)">${App.fmtDateTime(s.date)} • ${s.canal||'sms'}</span>
      </div>
      <p style="font-size:.92rem;color:#444">${s.message}</p>
    </div>`;
  }).join('');
}

function openModal() {
  document.getElementById('s-client').innerHTML = '<option value="">— Choisir —</option>' + Data.clients.all().map(c => `<option value="${c.id}">${c.prenom||''} ${c.nom}</option>`).join('');
  document.getElementById('s-tpl').innerHTML = '<option value="">— Personnalisé —</option>' +
    Object.entries(CONFIG.notifications.sms.modeles).map(([k,v]) => `<option value="${k}">${k.replace(/_/g,' ')}</option>`).join('');
  document.getElementById('s-msg').value = '';
  document.getElementById('char-count').textContent = '0';
  App.openModal('m-sms');
}

function applyTemplate() {
  const k = document.getElementById('s-tpl').value;
  if (!k) return;
  const tpl = CONFIG.notifications.sms.modeles[k] || '';
  const c = Data.clients.get(document.getElementById('s-client').value);
  let msg = tpl
    .replace('{prenom}', c?.prenom || c?.nom || '')
    .replace('{nom}', c?.nom || '')
    .replace('{date}', App.fmtDate(new Date()))
    .replace('{heure}', '')
    .replace('{service}', '')
    .replace('{numero}', '')
    .replace('{montant}', '')
    .replace('{lien}', '');
  document.getElementById('s-msg').value = msg;
  document.getElementById('char-count').textContent = msg.length;
}

function send() {
  const cId = document.getElementById('s-client').value;
  const msg = document.getElementById('s-msg').value.trim();
  const canal = document.querySelector('input[name=canal]:checked').value;
  const c = Data.clients.get(cId);
  if (!c || !msg) { App.toast('⚠️ Destinataire et message requis', 'warn'); return; }
  const tel = (c.tel || '').replace(/\s/g, '');

  // Mode manuel : ouvre l'app native
  if (canal === 'whatsapp') {
    const intl = tel.replace(/\D/g,'').replace(/^0/,'590');
    window.open(`https://wa.me/${intl}?text=${encodeURIComponent(msg)}`, '_blank');
  } else {
    location.href = `sms:${tel}?body=${encodeURIComponent(msg)}`;
  }

  // Trace localement
  Data.sms.add({
    client_id: cId, agent_id: session.user_id,
    message: msg, canal, statut: 'envoyé'
  });
  App.closeModal('m-sms');
  App.toast('✅ SMS prêt à envoyer', 'success');
  render();
}
</script>
</body>
</html>
