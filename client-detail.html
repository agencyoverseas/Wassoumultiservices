<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1b4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Client — Wassou</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="icons/favicon-32.png"/>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="status-spacer"></div>
<div class="back-bar">
  <a class="back-btn" href="clients.html"></a>
  <div class="back-title" id="ttl">Client</div>
  <button class="back-btn" id="editBtn"></button>
</div>

<main class="page fade-in" id="main"></main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/whatsapp.js"></script>
<script>
if (!Auth.guard()) {} else {
PWAInstall.init();
App.renderNav('clients');

document.querySelector('.back-btn').innerHTML = App.icons.back;
document.getElementById('editBtn').innerHTML = App.icons.edit;

const id = new URLSearchParams(location.search).get('id');
const c = DB.clients.get(id);
if (!c){ document.getElementById('main').innerHTML = `<p class="empty-state">Client introuvable</p>`; }
else render();

function render(){
  document.getElementById('ttl').textContent = `${c.prenom} ${c.nom}`;
  const ints = DB.interventions.all().filter(i => i.clientId === c.id);
  const dev = DB.devis.all().filter(d => d.clientId === c.id);
  document.getElementById('main').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--green-soft);color:var(--green-text);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center">${Fmt.initials(c.prenom,c.nom)}</div>
        <div>
          <div style="font-size:18px;font-weight:700">${c.prenom} ${c.nom}</div>
          <span class="li-status status-${c.statut||'actif'}">${c.statut==='prospect'?'Prospect':c.statut==='inactif'?'Inactif':'Client actif'}</span>
        </div>
      </div>
      <div class="li-row">${App.icons.phone}<span>${c.tel||'—'}</span></div>
      <div class="li-row">${App.icons.mail}<span>${c.email||'—'}</span></div>
      <div class="li-row">${App.icons.pin}<span>${c.adresse||'—'}</span></div>
      ${c.notes ? `<div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:10px;font-size:13.5px;color:var(--text-soft)">${c.notes}</div>` : ''}

      <div class="modal-actions" style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <a class="btn btn-outline btn-sm" href="tel:${c.tel||''}" style="padding:10px 6px;font-size:12.5px">${App.icons.phone} Appeler</a>
        <a class="btn btn-outline btn-sm" href="sms.html?clientId=${c.id}" style="padding:10px 6px;font-size:12.5px">${App.icons.sms} SMS</a>
        <button class="btn btn-sm" id="waBtn" style="padding:10px 6px;font-size:12.5px;background:#25D366;color:#fff;font-weight:600">📲 WhatsApp</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Historique interventions</div></div>
      ${ints.length ? ints.map(i => `
        <a href="intervention-detail.html?id=${i.id}" class="list-item" style="margin-bottom:8px;border:1px solid var(--border-soft)">
          <div class="li-head">
            <div>
              <div style="font-weight:600">${i.service||'—'}</div>
              <div style="font-size:13px;color:var(--text-soft);margin-top:4px">${Fmt.date(i.date)} ${i.heure||''}</div>
            </div>
            <span class="li-status status-${i.statut}">${i.statut}</span>
          </div>
        </a>
      `).join('') : '<p class="empty-state">Aucune intervention</p>'}
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Devis</div></div>
      ${dev.length ? dev.map(d => `
        <div style="padding:10px 0;border-bottom:1px solid var(--border-soft)">
          <div style="display:flex;justify-content:space-between"><strong>${d.numero||d.id}</strong><span class="li-status status-${d.statut||'brouillon'}">${d.statut||'brouillon'}</span></div>
          <div style="font-size:13px;color:var(--text-soft);margin-top:4px">${Fmt.date(d.date)} · ${Fmt.eur(d.total||0)}</div>
        </div>
      `).join('') : '<p class="empty-state">Aucun devis</p>'}
    </div>

    <button class="btn btn-danger btn-block mt-16" id="del">${App.icons.trash} Supprimer ce client</button>
  `;

  document.getElementById('del').addEventListener('click', async () => {
    if (await App.confirm('Supprimer définitivement ce client ?')){
      DB.clients.remove(c.id);
      App.toast('Client supprimé','success');
      setTimeout(()=>location.href='clients.html', 600);
    }
  });

  document.getElementById('waBtn').addEventListener('click', () => {
    Wa.pickAndSend(c);
  });

  document.getElementById('editBtn').addEventListener('click', () => {
    App.modal('Modifier client', `
      <form id="ed">
        <div class="form-group"><label>Nom</label><input class="form-control" name="nom" value="${c.nom||''}" required/></div>
        <div class="form-group"><label>Prénom</label><input class="form-control" name="prenom" value="${c.prenom||''}" required/></div>
        <div class="form-group"><label>Téléphone</label><input class="form-control" name="tel" type="tel" value="${c.tel||''}"/></div>
        <div class="form-group"><label>Email</label><input class="form-control" name="email" type="email" value="${c.email||''}"/></div>
        <div class="form-group"><label>Adresse</label><input class="form-control" name="adresse" value="${c.adresse||''}"/></div>
        <div class="form-group"><label>Statut</label>
          <select class="form-control" name="statut">
            <option value="actif" ${c.statut==='actif'?'selected':''}>Actif</option>
            <option value="prospect" ${c.statut==='prospect'?'selected':''}>Prospect</option>
            <option value="inactif" ${c.statut==='inactif'?'selected':''}>Inactif</option>
          </select>
        </div>
        <div class="form-group"><label>Notes</label><textarea class="form-control" name="notes">${c.notes||''}</textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close>Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    `, form => {
      const o = Object.fromEntries(new FormData(form));
      Object.assign(c, o);
      DB.clients.update(c.id, c);
      App.toast('Modifié','success');
      render();
    });
  });
}
}
</script>
</body>
</html>
