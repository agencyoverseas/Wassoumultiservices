<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Créer un devis — Wassou</title>
<meta name="theme-color" content="#1b4332"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .lignes-table { width: 100%; }
  .lignes-table th { background: var(--pale); font-size: .8rem; padding: 8px; }
  .lignes-table td { padding: 6px 4px; }
  .lignes-table input { width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 8px; font-size: .9rem; }
  .lignes-table input.qte, .lignes-table input.prix { text-align: right; }
  .lignes-table .total-cell { text-align: right; font-weight: 700; padding-right: 8px; }
  .totaux-box { max-width: 360px; margin-left: auto; }
  .totaux-box .row { display: flex; justify-content: space-between; padding: 6px 0; }
  .totaux-box .ttc { border-top: 2px solid var(--g); padding-top: 8px; margin-top: 6px; font-size: 1.1rem; font-weight: 800; color: var(--g); }
</style>
</head>
<body>
<div id="overlay"></div>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="burger-btn" id="burger">☰</button>
      <div class="page-title">📄 <span id="ph-title">Nouveau devis</span></div>
      <div class="header-actions no-print">
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Imprimer</button>
        <button class="btn btn-gold btn-sm" onclick="exportPDF()">📥 PDF</button>
        <button class="btn btn-primary btn-sm" onclick="save()">💾 Enregistrer</button>
      </div>
    </header>
    <div class="page-body">

      <div class="card mb-4 no-print">
        <h3 class="card-title">Informations</h3>
        <div class="f-row">
          <div class="fg"><label>Client *</label>
            <select id="d-client" required onchange="updateClientInfo()"></select>
          </div>
          <div class="fg"><label>Statut</label>
            <select id="d-statut">
              <option value="brouillon">📝 Brouillon</option>
              <option value="envoyé">📨 Envoyé</option>
              <option value="accepté">✅ Accepté</option>
              <option value="refusé">❌ Refusé</option>
              <option value="soldé">💰 Soldé</option>
            </select>
          </div>
        </div>
        <div class="f-row">
          <div class="fg"><label>Date</label><input type="date" id="d-date"/></div>
          <div class="fg"><label>Échéance</label><input type="date" id="d-echeance"/></div>
        </div>
        <div class="fg"><label>Notes / observations</label><textarea id="d-notes" rows="2"></textarea></div>
      </div>

      <!-- =============== APERÇU IMPRIMABLE =============== -->
      <div class="card devis-print" id="devis-print">
        <div class="dp-head">
          <div class="dp-logo">
            🌿
            <h1 id="dp-name">Wassou Multiservices</h1>
            <p id="dp-slogan" style="color:var(--text-soft);font-size:.85rem">Services en Guadeloupe</p>
            <p style="font-size:.78rem;color:var(--text-soft);margin-top:6px" id="dp-coords"></p>
          </div>
          <div class="dp-num">
            <p class="n" id="dp-num">DEV-2026-0001</p>
            <p style="font-size:.85rem;color:var(--text-soft);margin-top:4px">Date : <span id="dp-date">—</span></p>
            <p style="font-size:.85rem;color:var(--text-soft)">Validité : <span id="dp-echeance">—</span></p>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
          <div>
            <p style="font-size:.78rem;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Émetteur</p>
            <p style="font-weight:700" id="dp-emetteur">Wassou Multiservices</p>
            <p style="font-size:.85rem;color:var(--text-soft);line-height:1.5" id="dp-emetteur-coords">—</p>
          </div>
          <div>
            <p style="font-size:.78rem;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Destinataire</p>
            <p style="font-weight:700" id="dp-client">—</p>
            <p style="font-size:.85rem;color:var(--text-soft);line-height:1.5" id="dp-client-info"></p>
          </div>
        </div>

        <table class="lignes-table">
          <thead>
            <tr><th style="text-align:left">Description</th><th style="width:80px">Qté</th><th style="width:100px;text-align:right">P.U. HT</th><th style="width:120px;text-align:right">Total HT</th><th class="no-print" style="width:30px"></th></tr>
          </thead>
          <tbody id="lignes-body"></tbody>
        </table>
        <button class="btn btn-ghost btn-sm no-print" onclick="addLigne()" style="margin-top:8px">+ Ajouter une ligne</button>

        <div class="totaux-box mt-6">
          <div class="row"><span>Total HT</span><strong id="t-ht">0,00 €</strong></div>
          <div class="row"><span>TVA <span id="t-tva-pct"></span></span><strong id="t-tva">0,00 €</strong></div>
          <div class="row ttc"><span>Total TTC</span><strong id="t-ttc">0,00 €</strong></div>
          <div class="row" style="color:var(--gold);font-weight:700;margin-top:8px"><span>Acompte demandé (<span id="t-acompte-pct">30</span>%)</span><strong id="t-acompte">0,00 €</strong></div>
        </div>

        <div class="dp-foot">
          <p style="font-style:italic;margin-bottom:6px" id="dp-tva-mention"></p>
          <p style="margin-bottom:6px" id="dp-mentions">—</p>
          <p style="font-weight:700;color:var(--g);text-align:center;margin-top:14px" id="dp-pied">—</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
const session = App.initAdminPage(['admin','agent']);
const params = new URLSearchParams(location.search);
let currentDevis = null;
let lignes = [];

if (session) {
  document.addEventListener('DOMContentLoaded', () => {
    Sidebar.inject('devis');
    init();
  });
}

function init() {
  // Header émetteur
  document.getElementById('dp-name').textContent = CONFIG.business.nom;
  document.getElementById('dp-slogan').textContent = CONFIG.business.slogan;
  document.getElementById('dp-coords').innerHTML = `${CONFIG.business.telephone} • ${CONFIG.business.email}${CONFIG.business.siret?'<br/>SIRET '+CONFIG.business.siret:''}`;
  document.getElementById('dp-emetteur').textContent = CONFIG.business.nom;
  document.getElementById('dp-emetteur-coords').innerHTML = `${CONFIG.business.adresse}<br/>${CONFIG.business.telephone}<br/>${CONFIG.business.email}`;
  document.getElementById('dp-mentions').textContent = CONFIG.devis.mentions_legales;
  document.getElementById('dp-pied').textContent = CONFIG.devis.pied_de_page;
  document.getElementById('t-tva-pct').textContent = `(${CONFIG.paiement.tva_taux}%)`;
  document.getElementById('t-acompte-pct').textContent = CONFIG.paiement.acompte_min_pct;
  if (CONFIG.paiement.tva_taux === 0) {
    document.getElementById('dp-tva-mention').textContent = CONFIG.paiement.mention_tva_si_zero;
  }

  // Charger client list
  document.getElementById('d-client').innerHTML = '<option value="">— Choisir —</option>' + Data.clients.all().map(c => `<option value="${c.id}">${c.prenom||''} ${c.nom}</option>`).join('');

  const today = new Date().toISOString().slice(0,10);
  const eche = new Date(Date.now() + CONFIG.devis.duree_validite_jours * 86400000).toISOString().slice(0,10);
  document.getElementById('d-date').value = today;
  document.getElementById('d-echeance').value = eche;
  document.getElementById('dp-date').textContent = App.fmtDate(today);
  document.getElementById('dp-echeance').textContent = App.fmtDate(eche);

  const id = params.get('id');
  const preClientId = params.get('client');

  if (id) {
    currentDevis = Data.devis.get(id);
    if (currentDevis) {
      document.getElementById('ph-title').textContent = `Devis ${currentDevis.numero}`;
      document.getElementById('dp-num').textContent = currentDevis.numero;
      document.getElementById('d-client').value = currentDevis.client_id;
      document.getElementById('d-statut').value = currentDevis.statut;
      document.getElementById('d-date').value = currentDevis.date;
      document.getElementById('d-echeance').value = currentDevis.echeance;
      document.getElementById('d-notes').value = currentDevis.notes || '';
      lignes = [...(currentDevis.lignes || [])];
      updateClientInfo();
    }
  } else {
    document.getElementById('dp-num').textContent = Data.devis.nextNumber();
    if (preClientId) {
      document.getElementById('d-client').value = preClientId;
      updateClientInfo();
    }
    // Ligne par défaut
    const s = CONFIG.services[0];
    lignes = [{ description: s.nom, qte: 1, prix: s.prix_base }];
  }
  renderLignes();
}

function updateClientInfo() {
  const c = Data.clients.get(document.getElementById('d-client').value);
  if (c) {
    document.getElementById('dp-client').textContent = `${c.prenom||''} ${c.nom}`.trim();
    document.getElementById('dp-client-info').innerHTML = `${c.adresse||''}<br/>${c.tel||''}<br/>${c.email||''}`;
  } else {
    document.getElementById('dp-client').textContent = '—';
    document.getElementById('dp-client-info').textContent = '';
  }
}

function renderLignes() {
  const tbody = document.getElementById('lignes-body');
  tbody.innerHTML = lignes.map((l, i) => {
    const total = (l.qte || 0) * (l.prix || 0);
    return `<tr>
      <td><input value="${l.description||''}" oninput="lignes[${i}].description=this.value"/></td>
      <td><input type="number" step="0.5" value="${l.qte||0}" class="qte" oninput="lignes[${i}].qte=parseFloat(this.value)||0;updateTotals()"/></td>
      <td><input type="number" step="0.01" value="${l.prix||0}" class="prix" oninput="lignes[${i}].prix=parseFloat(this.value)||0;updateTotals()"/></td>
      <td class="total-cell">${App.fmtEur(total)}</td>
      <td class="no-print"><button class="action-btn danger" onclick="rmLigne(${i})" title="Supprimer">🗑️</button></td>
    </tr>`;
  }).join('');
  updateTotals();
}

function addLigne() { lignes.push({ description:'', qte:1, prix:0 }); renderLignes(); }
function rmLigne(i) { lignes.splice(i,1); renderLignes(); }

function updateTotals() {
  const ht = lignes.reduce((s,l) => s + (l.qte||0)*(l.prix||0), 0);
  const tva = ht * (CONFIG.paiement.tva_taux/100);
  const ttc = ht + tva;
  const acompte = Math.round(ttc * CONFIG.paiement.acompte_min_pct / 100 * 100) / 100;
  document.getElementById('t-ht').textContent = App.fmtEur(ht);
  document.getElementById('t-tva').textContent = App.fmtEur(tva);
  document.getElementById('t-ttc').textContent = App.fmtEur(ttc);
  document.getElementById('t-acompte').textContent = App.fmtEur(acompte);
}

function save() {
  const data = {
    client_id: document.getElementById('d-client').value,
    statut: document.getElementById('d-statut').value,
    date: document.getElementById('d-date').value,
    echeance: document.getElementById('d-echeance').value,
    notes: document.getElementById('d-notes').value,
    lignes: lignes.filter(l => l.description),
    agent_id: session.user_id,
  };
  if (!data.client_id) { App.toast('⚠️ Sélectionne un client', 'warn'); return; }
  if (!data.lignes.length) { App.toast('⚠️ Ajoute au moins une ligne', 'warn'); return; }
  if (currentDevis) {
    Data.devis.update(currentDevis.id, data);
    App.toast('✅ Devis modifié', 'success');
  } else {
    const d = Data.devis.add(data);
    App.toast(`✅ ${d.numero} créé`, 'success');
    setTimeout(() => location.href = `devis-create.html?id=${d.id}`, 700);
  }
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 18;
  doc.setFontSize(20); doc.setTextColor(27,67,50);
  doc.text(CONFIG.business.nom, 14, y);
  y += 6; doc.setFontSize(10); doc.setTextColor(80,80,80);
  doc.text(CONFIG.business.slogan, 14, y);
  y += 5; doc.text(`${CONFIG.business.telephone} • ${CONFIG.business.email}`, 14, y);
  y += 12; doc.setFontSize(14); doc.setTextColor(27,67,50);
  doc.text(`DEVIS ${document.getElementById('dp-num').textContent}`, 14, y);
  y += 6; doc.setFontSize(10); doc.setTextColor(80,80,80);
  doc.text(`Date : ${document.getElementById('dp-date').textContent}`, 14, y);
  y += 5; doc.text(`Validité : ${document.getElementById('dp-echeance').textContent}`, 14, y);

  const c = Data.clients.get(document.getElementById('d-client').value);
  if (c) {
    y += 10; doc.setTextColor(27,67,50); doc.setFontSize(11);
    doc.text(`Client : ${c.prenom||''} ${c.nom}`, 14, y);
    y += 5; doc.setFontSize(9); doc.setTextColor(80,80,80);
    if (c.adresse) { doc.text(c.adresse, 14, y); y += 4; }
    if (c.tel) { doc.text(c.tel, 14, y); y += 4; }
  }

  y += 8;
  doc.setFillColor(232,245,233);
  doc.rect(14, y-4, 182, 8, 'F');
  doc.setFontSize(9); doc.setTextColor(27,67,50);
  doc.text('Description', 16, y+1);
  doc.text('Qté', 110, y+1);
  doc.text('P.U.', 135, y+1);
  doc.text('Total', 175, y+1, { align: 'right' });
  y += 8;

  doc.setTextColor(0,0,0); doc.setFontSize(9);
  lignes.filter(l=>l.description).forEach(l => {
    doc.text(l.description, 16, y);
    doc.text(String(l.qte || 0), 110, y);
    doc.text(((l.prix||0).toFixed(2))+' €', 135, y);
    doc.text(((l.qte*l.prix)||0).toFixed(2)+' €', 195, y, { align: 'right' });
    y += 6;
  });

  y += 4;
  const ht = parseFloat(document.getElementById('t-ht').textContent.replace(/[^\d,.-]/g,'').replace(',','.'));
  const tva = parseFloat(document.getElementById('t-tva').textContent.replace(/[^\d,.-]/g,'').replace(',','.'));
  const ttc = parseFloat(document.getElementById('t-ttc').textContent.replace(/[^\d,.-]/g,'').replace(',','.'));
  doc.text(`Total HT : ${(ht||0).toFixed(2)} €`, 195, y, { align: 'right' }); y += 5;
  doc.text(`TVA (${CONFIG.paiement.tva_taux}%) : ${(tva||0).toFixed(2)} €`, 195, y, { align: 'right' }); y += 6;
  doc.setFontSize(12); doc.setTextColor(27,67,50);
  doc.text(`Total TTC : ${(ttc||0).toFixed(2)} €`, 195, y, { align: 'right' });

  if (CONFIG.paiement.tva_taux === 0) {
    y += 10; doc.setFontSize(8); doc.setTextColor(120,120,120);
    doc.text(CONFIG.paiement.mention_tva_si_zero, 14, y);
  }

  if (CONFIG.devis.pdf.afficher_iban && CONFIG.paiement.methodes.virement.active) {
    y += 8; doc.setFontSize(9); doc.setTextColor(27,67,50);
    doc.text('Coordonnées bancaires :', 14, y);
    y += 5; doc.setTextColor(80,80,80); doc.setFontSize(8);
    doc.text(`IBAN : ${CONFIG.paiement.methodes.virement.iban}`, 14, y);
    y += 4; doc.text(`BIC : ${CONFIG.paiement.methodes.virement.bic}`, 14, y);
  }

  y += 12; doc.setFontSize(9); doc.setTextColor(80,80,80);
  const mentions = doc.splitTextToSize(CONFIG.devis.mentions_legales, 180);
  doc.text(mentions, 14, y);

  doc.save(`${document.getElementById('dp-num').textContent}.pdf`);
  App.toast('✅ PDF généré', 'success');
}
</script>
</body>
</html>
